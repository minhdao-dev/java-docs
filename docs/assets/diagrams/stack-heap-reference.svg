<svg width="100%" style="max-width:320px" viewBox="0 0 480 240" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Stack vs Heap — reference variable</title>
  <desc>Stack holds primitive values and object references; Heap holds the actual objects</desc>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7BADE0" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- STACK container -->
  <rect x="20" y="20" width="180" height="200" rx="10"
    fill="#EEF4FB" stroke="#7BADE0" stroke-width="1.2"/>
  <text x="110" y="44" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="700"
    fill="#1A5296" letter-spacing="1.5">STACK</text>

  <!-- age (primitive) -->
  <rect x="36" y="56" width="148" height="38" rx="6"
    fill="#fff" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="52" y="71" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A">int</text>
  <text x="52" y="87" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#1A5296">age = 25</text>

  <!-- name (reference) -->
  <rect x="36" y="104" width="148" height="38" rx="6"
    fill="#fff" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="52" y="119" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A">String (ref)</text>
  <text x="52" y="135" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#1A5296">name → 0xA1</text>

  <!-- person (reference) -->
  <rect x="36" y="152" width="148" height="38" rx="6"
    fill="#fff" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="52" y="167" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A">Person (ref)</text>
  <text x="52" y="183" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#1A5296">p → 0xB2</text>

  <!-- HEAP container -->
  <rect x="260" y="20" width="200" height="200" rx="10"
    fill="#FFF8EE" stroke="#FFB74D" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="360" y="44" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="700"
    fill="#E65100" letter-spacing="1.5">HEAP</text>

  <!-- String object at 0xA1 -->
  <rect x="276" y="56" width="168" height="38" rx="6"
    fill="#fff" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="292" y="71" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A">0xA1 — String</text>
  <text x="292" y="87" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#E65100">"Alice"</text>

  <!-- Person object at 0xB2 -->
  <rect x="276" y="104" width="168" height="86" rx="6"
    fill="#fff" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="292" y="119" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A">0xB2 — Person</text>
  <text x="292" y="138" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#E65100">name: "Alice"</text>
  <text x="292" y="156" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#E65100">age: 25</text>
  <text x="292" y="176" font-family="ui-monospace,monospace" font-size="10" fill="#B4B2A9">score: 0.0</text>

  <!-- Arrow: name → String object -->
  <line x1="184" y1="123" x2="275" y2="75" stroke="#7BADE0" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Arrow: p → Person object -->
  <line x1="184" y1="171" x2="275" y2="147" stroke="#7BADE0" stroke-width="1.2" marker-end="url(#a)"/>
</svg>
