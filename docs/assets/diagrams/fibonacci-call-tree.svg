<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 336" style="max-width:480px;display:block;margin:1rem auto">

  <!-- Lines drawn first (behind nodes) -->

  <!-- Blue branch: fib(4)→fib(3) -->
  <line x1="270" y1="38"  x2="180" y2="118" stroke="#B8D0EE" stroke-width="1.3"/>
  <!-- Blue: fib(3)→fib(2)L -->
  <line x1="180" y1="118" x2="120" y2="198" stroke="#B8D0EE" stroke-width="1.3"/>
  <!-- Blue: fib(3)→fib(1)a -->
  <line x1="180" y1="118" x2="240" y2="198" stroke="#B8D0EE" stroke-width="1.3"/>
  <!-- Blue: fib(2)L→fib(1)b -->
  <line x1="120" y1="198" x2="80"  y2="278" stroke="#B8D0EE" stroke-width="1.3"/>
  <!-- Blue: fib(2)L→fib(0)a -->
  <line x1="120" y1="198" x2="160" y2="278" stroke="#B8D0EE" stroke-width="1.3"/>

  <!-- Orange dashed: fib(4)→fib(2)R (duplicate subtree) -->
  <line x1="270" y1="38"  x2="360" y2="118" stroke="#FFB74D" stroke-width="1.3" stroke-dasharray="5,3"/>
  <!-- Orange: fib(2)R→fib(1)c -->
  <line x1="360" y1="118" x2="320" y2="198" stroke="#FFB74D" stroke-width="1.3" stroke-dasharray="5,3"/>
  <!-- Orange: fib(2)R→fib(0)b -->
  <line x1="360" y1="118" x2="400" y2="198" stroke="#FFB74D" stroke-width="1.3" stroke-dasharray="5,3"/>

  <!-- Level 0: fib(4) -->
  <rect x="240" y="24"  width="60" height="28" rx="14" fill="#EEF4FB" stroke="#7BADE0" stroke-width="1"/>
  <text x="270" y="42"  text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1A5296">fib(4)</text>

  <!-- Level 1 -->
  <rect x="150" y="104" width="60" height="28" rx="14" fill="#EEF4FB" stroke="#7BADE0" stroke-width="1"/>
  <text x="180" y="122" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1A5296">fib(3)</text>

  <rect x="330" y="104" width="60" height="28" rx="14" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="360" y="122" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#E65100">fib(2)</text>

  <!-- Level 2 -->
  <rect x="90"  y="184" width="60" height="28" rx="14" fill="#EEF4FB" stroke="#7BADE0" stroke-width="1"/>
  <text x="120" y="202" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1A5296">fib(2)</text>

  <rect x="210" y="184" width="60" height="28" rx="14" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="240" y="202" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1B5E40">fib(1)</text>

  <rect x="290" y="184" width="60" height="28" rx="14" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="320" y="202" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#E65100">fib(1)</text>

  <rect x="370" y="184" width="60" height="28" rx="14" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="400" y="202" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#E65100">fib(0)</text>

  <!-- Level 3 -->
  <rect x="50"  y="264" width="60" height="28" rx="14" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="80"  y="282" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1B5E40">fib(1)</text>

  <rect x="130" y="264" width="60" height="28" rx="14" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="160" y="282" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#1B5E40">fib(0)</text>

  <!-- Legend (centered) -->
  <rect x="93"  y="314" width="11" height="11" rx="2" fill="#EEF4FB" stroke="#7BADE0" stroke-width="1"/>
  <text x="114" y="323" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#555">fresh computation</text>

  <rect x="214" y="314" width="11" height="11" rx="2" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="235" y="323" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#555">recomputed (wasted)</text>

  <rect x="346" y="314" width="11" height="11" rx="2" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="367" y="323" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#555">base case</text>
</svg>
