<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" style="max-width:700px;display:block;margin:1rem auto">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7BADE0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Interface box ──────────────────────────────── -->
  <rect x="22" y="30" width="296" height="260" rx="8" fill="#F0F7FF"
        stroke="#0369A1" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- header -->
  <rect x="22" y="30" width="296" height="46" rx="8" fill="#0369A1"/>
  <rect x="22" y="60" width="296" height="16" fill="#0369A1"/>
  <text x="170" y="47" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="10" fill="#7DD3FC" letter-spacing="1">«interface»</text>
  <text x="170" y="64" text-anchor="middle"
        font-family="ui-monospace,monospace" font-size="13" font-weight="700" fill="#fff">Payable</text>

  <!-- fields row -->
  <line x1="22" y1="76" x2="318" y2="76" stroke="#BAE6FD" stroke-width="0.8"/>
  <rect x="23" y="77" width="294" height="54" fill="#EFF8FF"/>
  <text x="38" y="96" font-family="ui-monospace,monospace" font-size="12" fill="#9CA3AF">❌  instance fields</text>
  <text x="38" y="114" font-family="ui-monospace,monospace" font-size="12" fill="#9CA3AF">❌  constructor</text>

  <!-- abstract methods -->
  <line x1="22" y1="131" x2="318" y2="131" stroke="#BAE6FD" stroke-width="0.8"/>
  <rect x="23" y="132" width="294" height="74" fill="#E0F2FE"/>
  <text x="38" y="150" font-family="ui-sans-serif,sans-serif" font-size="12"
        fill="#0369A1" font-weight="700" letter-spacing="0.5">ABSTRACT METHODS</text>
  <text x="38" y="169" font-family="ui-monospace,monospace" font-size="12"
        fill="#075985" font-style="italic">double getAmount()</text>
  <text x="38" y="188" font-family="ui-monospace,monospace" font-size="12"
        fill="#075985" font-style="italic">String getCurrency()</text>

  <!-- default / static / private methods -->
  <line x1="22" y1="206" x2="318" y2="206" stroke="#BAE6FD" stroke-width="0.8"/>
  <rect x="23" y="207" width="294" height="83" fill="#F0F9FF"/>
  <text x="38" y="226" font-family="ui-sans-serif,sans-serif" font-size="12"
        fill="#0369A1" font-weight="700" letter-spacing="0.5">DEFAULT / STATIC / PRIVATE</text>
  <text x="38" y="246" font-family="ui-monospace,monospace" font-size="12" fill="#0369A1">default String formatted()</text>
  <text x="38" y="266" font-family="ui-monospace,monospace" font-size="12" fill="#0369A1">static Payable of(double v)</text>
  <text x="296" y="266" text-anchor="end" font-family="ui-sans-serif,sans-serif"
        font-size="10" fill="#0369A1" font-style="italic">Java 8+</text>

  <!-- redraw border on top -->
  <rect x="22" y="30" width="296" height="260" rx="8" fill="none"
        stroke="#0369A1" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- label -->
  <text x="170" y="22" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="12" font-weight="700" fill="#0369A1">Interface</text>

  <!-- ── Abstract class box ─────────────────────────── -->
  <rect x="382" y="30" width="296" height="260" rx="8" fill="#F8FAFD"
        stroke="#0C4A6E" stroke-width="1.5"/>

  <!-- header -->
  <rect x="382" y="30" width="296" height="46" rx="8" fill="#0C4A6E"/>
  <rect x="382" y="60" width="296" height="16" fill="#0C4A6E"/>
  <text x="530" y="47" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="10" fill="#7BADE0" letter-spacing="1">«abstract class»</text>
  <text x="530" y="64" text-anchor="middle"
        font-family="ui-monospace,monospace" font-size="13" font-weight="700" fill="#fff">PaymentProcessor</text>

  <!-- fields + constructor -->
  <line x1="382" y1="76" x2="678" y2="76" stroke="#7BADE0" stroke-width="0.8"/>
  <rect x="383" y="77" width="294" height="54" fill="#EEF4FB"/>
  <text x="398" y="96" font-family="ui-monospace,monospace" font-size="12" fill="#0C4A6E">✅  String name  (field)</text>
  <text x="398" y="114" font-family="ui-monospace,monospace" font-size="12" fill="#0C4A6E">✅  PaymentProcessor(name)</text>

  <!-- abstract methods -->
  <line x1="382" y1="131" x2="678" y2="131" stroke="#7BADE0" stroke-width="0.8"/>
  <rect x="383" y="132" width="294" height="56" fill="#E8EFFE"/>
  <text x="398" y="150" font-family="ui-sans-serif,sans-serif" font-size="12"
        fill="#0C4A6E" font-weight="700" letter-spacing="0.5">ABSTRACT METHODS</text>
  <text x="398" y="169" font-family="ui-monospace,monospace" font-size="12"
        fill="#075985" font-style="italic">boolean executePayment(double)</text>

  <!-- concrete methods -->
  <line x1="382" y1="188" x2="678" y2="188" stroke="#7BADE0" stroke-width="0.8"/>
  <rect x="383" y="189" width="294" height="101" fill="#F8FAFD"/>
  <text x="398" y="208" font-family="ui-sans-serif,sans-serif" font-size="12"
        fill="#0C4A6E" font-weight="700" letter-spacing="0.5">CONCRETE METHODS</text>
  <text x="398" y="228" font-family="ui-monospace,monospace" font-size="12" fill="#1A5296">final boolean processPayment()</text>
  <text x="398" y="248" font-family="ui-monospace,monospace" font-size="12" fill="#1A5296">String getStats()</text>
  <text x="675" y="248" text-anchor="end" font-family="ui-sans-serif,sans-serif"
        font-size="10" fill="#1A5296" font-style="italic">shared</text>

  <!-- redraw border on top -->
  <rect x="382" y="30" width="296" height="260" rx="8" fill="none" stroke="#0C4A6E" stroke-width="1.5"/>

  <!-- label -->
  <text x="530" y="22" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="12" font-weight="700" fill="#0C4A6E">Abstract Class</text>

  <!-- ── Implementing / extending classes at bottom ─── -->
  <!-- Invoice -->
  <rect x="66" y="318" width="208" height="30" rx="6" fill="#0369A1"/>
  <text x="170" y="338" text-anchor="middle"
        font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#fff">Invoice implements Payable</text>
  <line x1="170" y1="318" x2="170" y2="291" stroke="#7BADE0" stroke-width="1.2"
        stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- CreditCard -->
  <rect x="418" y="318" width="224" height="30" rx="6" fill="#0C4A6E"/>
  <text x="530" y="338" text-anchor="middle"
        font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#fff">CreditCard extends Processor</text>
  <line x1="530" y1="318" x2="530" y2="291" stroke="#7BADE0" stroke-width="1.2"
        marker-end="url(#arr)"/>

  <!-- CAN-DO / IS-A labels -->
  <text x="170" y="312" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="11" fill="#0369A1" font-style="italic">CAN-DO relationship</text>
  <text x="530" y="312" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="11" fill="#0C4A6E" font-style="italic">IS-A relationship</text>
</svg>
