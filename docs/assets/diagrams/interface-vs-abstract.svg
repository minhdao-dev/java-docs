<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" style="max-width:700px;display:block;margin:1rem auto">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7BADE0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Interface box ──────────────────────────────── -->
  <!-- dashed outer border -->
  <rect x="22" y="30" width="296" height="222" rx="8" fill="#F0F7FF"
        stroke="#0369A1" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- header -->
  <rect x="22" y="30" width="296" height="46" rx="8" fill="#0369A1"/>
  <rect x="22" y="60" width="296" height="16" fill="#0369A1"/>
  <text x="170" y="47" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="9" fill="#7DD3FC" letter-spacing="1">«interface»</text>
  <text x="170" y="64" text-anchor="middle"
        font-family="ui-monospace,monospace" font-size="13" font-weight="700" fill="#fff">Payable</text>

  <!-- divider — fields row -->
  <line x1="22" y1="76" x2="318" y2="76" stroke="#BAE6FD" stroke-width="0.8"/>
  <rect x="23" y="77" width="294" height="42" fill="#EFF8FF"/>
  <text x="38" y="93" font-family="ui-monospace,monospace" font-size="10.5" fill="#9CA3AF">❌  instance fields</text>
  <text x="38" y="110" font-family="ui-monospace,monospace" font-size="10.5" fill="#9CA3AF">❌  constructor</text>

  <!-- divider — abstract methods -->
  <line x1="22" y1="119" x2="318" y2="119" stroke="#BAE6FD" stroke-width="0.8"/>
  <rect x="23" y="120" width="294" height="62" fill="#E0F2FE"/>
  <text x="38" y="137" font-family="ui-sans-serif,sans-serif" font-size="8.5"
        fill="#0369A1" font-weight="700" letter-spacing="0.5">ABSTRACT METHODS</text>
  <text x="38" y="153" font-family="ui-monospace,monospace" font-size="10.5"
        fill="#075985" font-style="italic">double getAmount()</text>
  <text x="38" y="170" font-family="ui-monospace,monospace" font-size="10.5"
        fill="#075985" font-style="italic">String getCurrency()</text>

  <!-- divider — default methods -->
  <line x1="22" y1="182" x2="318" y2="182" stroke="#BAE6FD" stroke-width="0.8"/>
  <rect x="23" y="183" width="294" height="68" fill="#F0F9FF"/>
  <text x="38" y="200" font-family="ui-sans-serif,sans-serif" font-size="8.5"
        fill="#0369A1" font-weight="700" letter-spacing="0.5">DEFAULT / STATIC / PRIVATE</text>
  <text x="38" y="216" font-family="ui-monospace,monospace" font-size="10.5" fill="#0369A1">default String formatted()</text>
  <text x="38" y="232" font-family="ui-monospace,monospace" font-size="10.5" fill="#0369A1">static Payable of(double v)</text>
  <text x="296" y="232" text-anchor="end" font-family="ui-sans-serif,sans-serif"
        font-size="8" fill="#0369A1" font-style="italic">Java 8+</text>

  <!-- redraw border on top -->
  <rect x="22" y="30" width="296" height="222" rx="8" fill="none"
        stroke="#0369A1" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- label -->
  <text x="170" y="22" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="700" fill="#0369A1">Interface</text>

  <!-- ── Abstract class box ─────────────────────────── -->
  <rect x="382" y="30" width="296" height="222" rx="8" fill="#F8FAFD"
        stroke="#0C4A6E" stroke-width="1.5"/>

  <!-- header -->
  <rect x="382" y="30" width="296" height="46" rx="8" fill="#0C4A6E"/>
  <rect x="382" y="60" width="296" height="16" fill="#0C4A6E"/>
  <text x="530" y="47" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="9" fill="#7BADE0" letter-spacing="1">«abstract class»</text>
  <text x="530" y="64" text-anchor="middle"
        font-family="ui-monospace,monospace" font-size="13" font-weight="700" fill="#fff">PaymentProcessor</text>

  <!-- divider — fields + constructor -->
  <line x1="382" y1="76" x2="678" y2="76" stroke="#7BADE0" stroke-width="0.8"/>
  <rect x="383" y="77" width="294" height="42" fill="#EEF4FB"/>
  <text x="398" y="93" font-family="ui-monospace,monospace" font-size="10.5" fill="#0C4A6E">✅  String name  (field)</text>
  <text x="398" y="110" font-family="ui-monospace,monospace" font-size="10.5" fill="#0C4A6E">✅  PaymentProcessor(name)</text>

  <!-- divider — abstract methods -->
  <line x1="382" y1="119" x2="678" y2="119" stroke="#7BADE0" stroke-width="0.8"/>
  <rect x="383" y="120" width="294" height="46" fill="#E8EFFE"/>
  <text x="398" y="137" font-family="ui-sans-serif,sans-serif" font-size="8.5"
        fill="#0C4A6E" font-weight="700" letter-spacing="0.5">ABSTRACT METHODS</text>
  <text x="398" y="153" font-family="ui-monospace,monospace" font-size="10.5"
        fill="#075985" font-style="italic">boolean executePayment(double)</text>

  <!-- divider — concrete methods -->
  <line x1="382" y1="166" x2="678" y2="166" stroke="#7BADE0" stroke-width="0.8"/>
  <rect x="383" y="167" width="294" height="84" fill="#F8FAFD"/>
  <text x="398" y="184" font-family="ui-sans-serif,sans-serif" font-size="8.5"
        fill="#0C4A6E" font-weight="700" letter-spacing="0.5">CONCRETE METHODS</text>
  <text x="398" y="200" font-family="ui-monospace,monospace" font-size="10.5" fill="#1A5296">final boolean processPayment()</text>
  <text x="398" y="216" font-family="ui-monospace,monospace" font-size="10.5" fill="#1A5296">String getStats()</text>
  <text x="675" y="216" text-anchor="end" font-family="ui-sans-serif,sans-serif"
        font-size="8" fill="#1A5296" font-style="italic">shared</text>

  <!-- redraw border on top -->
  <rect x="382" y="30" width="296" height="222" rx="8" fill="none" stroke="#0C4A6E" stroke-width="1.5"/>

  <!-- label -->
  <text x="530" y="22" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="700" fill="#0C4A6E">Abstract Class</text>

  <!-- ── Implementing / extending classes at bottom ─── -->
  <!-- Invoice -->
  <rect x="80" y="278" width="182" height="30" rx="6" fill="#0369A1"/>
  <text x="171" y="298" text-anchor="middle"
        font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#fff">Invoice implements Payable</text>
  <line x1="171" y1="278" x2="171" y2="253" stroke="#7BADE0" stroke-width="1.2"
        stroke-dasharray="4 2" marker-end="url(#arr)"/>

  <!-- CreditCard -->
  <rect x="432" y="278" width="196" height="30" rx="6" fill="#0C4A6E"/>
  <text x="530" y="298" text-anchor="middle"
        font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#fff">CreditCard extends Processor</text>
  <line x1="530" y1="278" x2="530" y2="253" stroke="#7BADE0" stroke-width="1.2"
        marker-end="url(#arr)"/>

  <!-- CAN-DO / IS-A labels -->
  <text x="171" y="273" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="9" fill="#0369A1" font-style="italic">CAN-DO relationship</text>
  <text x="530" y="273" text-anchor="middle"
        font-family="ui-sans-serif,sans-serif" font-size="9" fill="#0C4A6E" font-style="italic">IS-A relationship</text>
</svg>
