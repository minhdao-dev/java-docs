<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 288" style="max-width:460px;display:block;margin:1rem auto">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Outer class box -->
  <rect x="108" y="16" width="244" height="256" rx="8" fill="#F8FAFD" stroke="#7BADE0" stroke-width="1.2"/>

  <!-- Header (class name) -->
  <rect x="108" y="16" width="244" height="44" rx="8" fill="#1A5296"/>
  <rect x="108" y="44" width="244" height="16" fill="#1A5296"/>
  <text x="230" y="34" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#7BADE0" letter-spacing="1">«class»</text>
  <text x="230" y="52" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#fff">Student</text>

  <!-- Divider — fields -->
  <line x1="108" y1="60" x2="352" y2="60" stroke="#7BADE0" stroke-width="0.8"/>

  <!-- Fields section -->
  <rect x="109" y="61" width="242" height="74" fill="#EEF4FB"/>
  <text x="122" y="80" font-family="ui-monospace,monospace" font-size="11" fill="#1A5296">- name  :  String</text>
  <text x="122" y="97" font-family="ui-monospace,monospace" font-size="11" fill="#1A5296">- age   :  int</text>
  <text x="122" y="114" font-family="ui-monospace,monospace" font-size="11" fill="#1A5296">- gpa   :  double</text>
  <text x="340" y="80" text-anchor="end" font-family="ui-sans-serif,sans-serif" font-size="8.5" fill="#7BADE0" font-style="italic">private</text>

  <!-- Divider — constructor -->
  <line x1="108" y1="135" x2="352" y2="135" stroke="#FFB74D" stroke-width="0.8"/>

  <!-- Constructor section -->
  <rect x="109" y="136" width="242" height="44" fill="#FFF8EE"/>
  <text x="122" y="155" font-family="ui-monospace,monospace" font-size="11" fill="#E65100">+ Student(name, age)</text>
  <text x="122" y="171" font-family="ui-monospace,monospace" font-size="9.5" fill="#B4B2A9">  this.name = name  ···</text>

  <!-- Divider — methods -->
  <line x1="108" y1="180" x2="352" y2="180" stroke="#81C784" stroke-width="0.8"/>

  <!-- Methods section -->
  <rect x="109" y="181" width="242" height="90" rx="0" fill="#E8F5E9"/>
  <rect x="109" y="253" width="242" height="18" rx="0" fill="#E8F5E9"/>
  <rect x="109" y="261" width="242" height="10" rx="8" fill="#E8F5E9"/>
  <text x="122" y="199" font-family="ui-monospace,monospace" font-size="11" fill="#1B5E40">+ getName()  :  String</text>
  <text x="122" y="215" font-family="ui-monospace,monospace" font-size="11" fill="#1B5E40">+ setGpa(v : double)</text>
  <text x="122" y="231" font-family="ui-monospace,monospace" font-size="11" fill="#1B5E40">+ toString()  :  String</text>
  <text x="122" y="247" font-family="ui-monospace,monospace" font-size="11" fill="#1B5E40">+ equals(o : Object)</text>

  <!-- Redraw outer border on top -->
  <rect x="108" y="16" width="244" height="256" rx="8" fill="none" stroke="#7BADE0" stroke-width="1.2"/>

  <!-- Labels on left with lines -->
  <!-- class name -->
  <text x="78" y="42" text-anchor="end" dominant-baseline="middle" font-family="ui-sans-serif,sans-serif" font-size="10" font-weight="700" fill="#1A5296">class name</text>
  <line x1="90" y1="42" x2="106" y2="42" stroke="#1A5296" stroke-width="1" marker-end="url(#arr)"/>

  <!-- fields -->
  <text x="78" y="97" text-anchor="end" dominant-baseline="middle" font-family="ui-sans-serif,sans-serif" font-size="10" font-weight="700" fill="#1A5296">fields</text>
  <line x1="90" y1="97" x2="106" y2="97" stroke="#1A5296" stroke-width="1" marker-end="url(#arr)"/>

  <!-- constructor -->
  <text x="78" y="157" text-anchor="end" dominant-baseline="middle" font-family="ui-sans-serif,sans-serif" font-size="10" font-weight="700" fill="#E65100">constructor</text>
  <line x1="90" y1="157" x2="106" y2="157" stroke="#E65100" stroke-width="1" marker-end="url(#arr)"/>

  <!-- methods -->
  <text x="78" y="224" text-anchor="end" dominant-baseline="middle" font-family="ui-sans-serif,sans-serif" font-size="10" font-weight="700" fill="#2E7D32">methods</text>
  <line x1="90" y1="224" x2="106" y2="224" stroke="#2E7D32" stroke-width="1" marker-end="url(#arr)"/>
</svg>
