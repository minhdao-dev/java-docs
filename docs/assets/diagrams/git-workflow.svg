<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 200" style="max-width:580px;display:block;margin:1rem auto">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-up" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-down" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7BADE0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Working Directory box -->
  <rect x="20" y="60" width="120" height="80" rx="8" fill="#FFF8EE" stroke="#FFB74D" stroke-width="1.5"/>
  <rect x="20" y="60" width="120" height="28" rx="8" fill="#FFB74D"/>
  <rect x="20" y="76" width="120" height="12" fill="#FFB74D"/>
  <text x="80" y="79" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="#fff">Working Directory</text>
  <text x="80" y="104" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#E65100">your code files</text>
  <text x="80" y="120" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#B4B2A9">untracked / modified</text>

  <!-- Staging Area box -->
  <rect x="210" y="60" width="120" height="80" rx="8" fill="#EEF4FB" stroke="#7BADE0" stroke-width="1.5"/>
  <rect x="210" y="60" width="120" height="28" rx="8" fill="#1A5296"/>
  <rect x="210" y="76" width="120" height="12" fill="#1A5296"/>
  <text x="270" y="79" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="#fff">Staging Area</text>
  <text x="270" y="104" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#1A5296">snapshot ready</text>
  <text x="270" y="120" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#B4B2A9">git add</text>

  <!-- Local Repo box -->
  <rect x="400" y="60" width="120" height="80" rx="8" fill="#E8F5E9" stroke="#81C784" stroke-width="1.5"/>
  <rect x="400" y="60" width="120" height="28" rx="8" fill="#2E7D32"/>
  <rect x="400" y="76" width="120" height="12" fill="#2E7D32"/>
  <text x="460" y="79" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="#fff">Local Repository</text>
  <text x="460" y="104" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#2E7D32">commit history</text>
  <text x="460" y="120" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#B4B2A9">git commit</text>

  <!-- Working Dir → Staging: git add -->
  <line x1="142" y1="94" x2="207" y2="94" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="175" y="85" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#555">git add</text>

  <!-- Staging → Local Repo: git commit -->
  <line x1="332" y1="94" x2="397" y2="94" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="365" y="85" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#555">git commit</text>

  <!-- Remote GitHub box at top -->
  <rect x="210" y="10" width="160" height="36" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="290" y="24" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="#6A1B9A">GitHub (Remote)</text>
  <text x="290" y="38" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#9C27B0">shared repository</text>

  <!-- Local Repo → GitHub: git push (curved up) -->
  <path d="M460 60 Q460 28 372 28" fill="none" stroke="#4CAF50" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-up)"/>
  <text x="436" y="22" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#2E7D32">git push</text>

  <!-- GitHub → Working Dir: git pull (curved down) -->
  <path d="M208 28 Q120 28 80 58" fill="none" stroke="#7BADE0" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-down)"/>
  <text x="132" y="22" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#1A5296">git pull</text>

  <!-- Legend -->
  <line x1="20" y1="168" x2="44" y2="168" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="50" y="172" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#555">local flow</text>
  <line x1="110" y1="168" x2="134" y2="168" stroke="#4CAF50" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-up)"/>
  <text x="140" y="172" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#555">push to remote</text>
  <line x1="240" y1="168" x2="264" y2="168" stroke="#7BADE0" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-down)"/>
  <text x="270" y="172" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#555">pull from remote</text>
</svg>
