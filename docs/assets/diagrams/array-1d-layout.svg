<svg width="100%" style="max-width:480px" viewBox="0 0 520 158" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Array memory layout — Stack reference pointing to Heap array</title>
  <desc>int[] scores on the Stack holds a reference to the actual array data on the Heap</desc>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7BADE0" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- STACK container: x=10, w=130, right edge=140 -->
  <rect x="10" y="12" width="130" height="134" rx="10"
    fill="#EEF4FB" stroke="#7BADE0" stroke-width="1.2"/>
  <text x="75" y="36" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="700"
    fill="#1A5296" letter-spacing="1.5">STACK</text>

  <!-- scores variable box: x=22, w=106, right=128 -->
  <rect x="22" y="50" width="106" height="56" rx="6"
    fill="#fff" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="75" y="68" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="10" fill="#5F5E5A">int[] scores</text>
  <text x="75" y="90" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="12" font-weight="600" fill="#1A5296">→ 0xC3</text>

  <!-- Arrow: from stack inner-box right edge to heap left -->
  <line x1="130" y1="78" x2="163" y2="78"
    stroke="#7BADE0" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- HEAP container: x=166, w=342, right=508 -->
  <rect x="166" y="12" width="342" height="134" rx="10"
    fill="#FFF8EE" stroke="#FFB74D" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="337" y="36" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="700"
    fill="#E65100" letter-spacing="1.5">HEAP</text>

  <!--
    5 cells × 54px wide + 4 gaps × 4px = 286px total
    HEAP inner width = 342px → padding each side = (342-286)/2 = 28px
    Cell 0 starts at: 166+28=194
    Centers: 221, 279, 337, 395, 453
  -->

  <!-- Cell 0: x=194, center=221 -->
  <rect x="194" y="48" width="54" height="50" rx="5"
    fill="#fff" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="221" y="79" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="14" font-weight="600" fill="#E65100">85</text>
  <text x="221" y="113" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="11" fill="#B4B2A9">[0]</text>

  <!-- Cell 1: x=252, center=279 -->
  <rect x="252" y="48" width="54" height="50" rx="5"
    fill="#fff" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="279" y="79" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="14" font-weight="600" fill="#E65100">92</text>
  <text x="279" y="113" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="11" fill="#B4B2A9">[1]</text>

  <!-- Cell 2: x=310, center=337 -->
  <rect x="310" y="48" width="54" height="50" rx="5"
    fill="#fff" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="337" y="79" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="14" font-weight="600" fill="#E65100">78</text>
  <text x="337" y="113" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="11" fill="#B4B2A9">[2]</text>

  <!-- Cell 3: x=368, center=395 -->
  <rect x="368" y="48" width="54" height="50" rx="5"
    fill="#fff" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="395" y="79" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="14" font-weight="600" fill="#E65100">95</text>
  <text x="395" y="113" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="11" fill="#B4B2A9">[3]</text>

  <!-- Cell 4: x=426, center=453 -->
  <rect x="426" y="48" width="54" height="50" rx="5"
    fill="#fff" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="453" y="79" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="14" font-weight="600" fill="#E65100">88</text>
  <text x="453" y="113" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="11" fill="#B4B2A9">[4]</text>

  <!-- scores.length label — centered in HEAP -->
  <text x="337" y="136" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#B4B2A9">scores.length = 5</text>
</svg>
