<svg width="100%" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img" style="max-width:680px">
  <title>JVM Architecture</title>
  <desc>Sơ đồ kiến trúc JVM từ source code đến native OS execution</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4A7FC1" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── STEP 1: Source file ── -->
  <rect x="20" y="30" width="120" height="50" rx="8"
    fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="80" y="52" font-family="ui-monospace,monospace" font-size="13"
    font-weight="500" fill="#2C2C2A" text-anchor="middle">MyApp.java</text>
  <text x="80" y="68" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A" text-anchor="middle">Source code</text>

  <!-- javac label + arrow -->
  <line x1="140" y1="55" x2="178" y2="55" stroke="#888" stroke-width="1.2"
    marker-end="url(#arrow)"/>
  <text x="159" y="44" font-family="ui-monospace,monospace" font-size="12"
    fill="#5F5E5A" text-anchor="middle">javac</text>

  <!-- ── STEP 2: Bytecode ── -->
  <rect x="180" y="30" width="120" height="50" rx="8"
    fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
  <text x="240" y="52" font-family="ui-monospace,monospace" font-size="13"
    font-weight="500" fill="#085041" text-anchor="middle">MyApp.class</text>
  <text x="240" y="68" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#0F6E56" text-anchor="middle">Bytecode</text>

  <!-- loads label + arrow -->
  <line x1="300" y1="55" x2="338" y2="55" stroke="#4A7FC1" stroke-width="1.2"
    marker-end="url(#arrow-blue)"/>
  <text x="319" y="44" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#4A7FC1" text-anchor="middle">loads</text>

  <!-- ══════════════════════════════════
       JVM CONTAINER
  ══════════════════════════════════ -->
  <rect x="340" y="14" width="322" height="568" rx="16"
    fill="none" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="501" y="36" font-family="ui-sans-serif,sans-serif" font-size="13"
    font-weight="600" fill="#2C2C2A" text-anchor="middle">JVM</text>

  <!-- ── ClassLoader ── -->
  <rect x="356" y="44" width="290" height="60" rx="8"
    fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.8"/>
  <text x="501" y="67" font-family="ui-sans-serif,sans-serif" font-size="13"
    font-weight="600" fill="#3C3489" text-anchor="middle">ClassLoader Subsystem</text>
  <text x="501" y="84" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#534AB7" text-anchor="middle">Bootstrap → Platform → Application</text>

  <!-- arrow down to memory -->
  <line x1="501" y1="104" x2="501" y2="130" stroke="#888" stroke-width="1.2"
    marker-end="url(#arrow)"/>

  <!-- ── Runtime Memory Areas container ── -->
  <rect x="356" y="132" width="290" height="284" rx="10"
    fill="none" stroke="#D3D1C7" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="501" y="152" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#888780" text-anchor="middle">Runtime Memory Areas</text>

  <!-- Method Area -->
  <rect x="368" y="158" width="266" height="46" rx="6"
    fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.8"/>
  <text x="501" y="177" font-family="ui-sans-serif,sans-serif" font-size="13"
    font-weight="600" fill="#0C447C" text-anchor="middle">Method Area (Metaspace)</text>
  <text x="501" y="193" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#185FA5" text-anchor="middle">Class metadata · static fields · bytecode</text>

  <!-- Heap -->
  <rect x="368" y="212" width="266" height="62" rx="6"
    fill="#EAF3DE" stroke="#97C459" stroke-width="0.8"/>
  <text x="501" y="232" font-family="ui-sans-serif,sans-serif" font-size="13"
    font-weight="600" fill="#27500A" text-anchor="middle">Heap</text>
  <text x="501" y="248" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#3B6D11" text-anchor="middle">Objects &amp; arrays — shared across all threads</text>
  <text x="501" y="264" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#3B6D11" text-anchor="middle">Young Gen (Eden + S0 + S1) │ Old Gen</text>

  <!-- JVM Stack -->
  <rect x="368" y="282" width="266" height="62" rx="6"
    fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8"/>
  <text x="501" y="302" font-family="ui-sans-serif,sans-serif" font-size="13"
    font-weight="600" fill="#633806" text-anchor="middle">JVM Stack (per thread)</text>
  <text x="501" y="318" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#854F0B" text-anchor="middle">Stack frames · local variables · primitives</text>
  <text x="501" y="334" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#854F0B" text-anchor="middle">Created per thread — NOT shared</text>

  <!-- PC Register + Native Stack (side by side) -->
  <rect x="368" y="352" width="128" height="54" rx="6"
    fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="432" y="372" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="600" fill="#2C2C2A" text-anchor="middle">PC Register</text>
  <text x="432" y="388" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A" text-anchor="middle">Current instruction</text>
  <text x="432" y="400" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A" text-anchor="middle">per thread</text>

  <rect x="506" y="352" width="128" height="54" rx="6"
    fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="570" y="372" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="600" fill="#2C2C2A" text-anchor="middle">Native Stack</text>
  <text x="570" y="388" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A" text-anchor="middle">JNI / native methods</text>
  <text x="570" y="400" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A" text-anchor="middle">per thread</text>

  <!-- arrow down to execution engine -->
  <line x1="501" y1="418" x2="501" y2="446" stroke="#888" stroke-width="1.2"
    marker-end="url(#arrow)"/>

  <!-- ── Execution Engine ── -->
  <rect x="356" y="448" width="290" height="64" rx="8"
    fill="#FAECE7" stroke="#F0997B" stroke-width="0.8"/>
  <text x="501" y="470" font-family="ui-sans-serif,sans-serif" font-size="13"
    font-weight="600" fill="#4A1B0C" text-anchor="middle">Execution Engine</text>
  <text x="501" y="487" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#712B13" text-anchor="middle">Interpreter + JIT Compiler</text>
  <text x="501" y="503" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#712B13" text-anchor="middle">Garbage Collector (G1GC / ZGC)</text>

  <!-- arrow down to OS -->
  <line x1="501" y1="512" x2="501" y2="538" stroke="#888" stroke-width="1.2"
    marker-end="url(#arrow)"/>

  <!-- ── Native OS ── -->
  <rect x="356" y="540" width="290" height="34" rx="8"
    fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="501" y="562" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="500" fill="#2C2C2A" text-anchor="middle">Native OS — Linux / macOS / Windows</text>

  <!-- ── Left side callouts ── -->
  <!-- Stack callout -->
  <line x1="200" y1="313" x2="356" y2="313" stroke="#D3D1C7" stroke-width="0.8"
    stroke-dasharray="4 3"/>
  <text x="20" y="300" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A">Stack = thread-private</text>
  <text x="20" y="314" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A">fast, limited size</text>
  <text x="20" y="328" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A">overflow → StackOverflowError</text>

  <!-- Heap callout -->
  <line x1="200" y1="243" x2="356" y2="243" stroke="#D3D1C7" stroke-width="0.8"
    stroke-dasharray="4 3"/>
  <text x="20" y="218" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A">Heap = shared memory</text>
  <text x="20" y="232" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A">large, GC-managed</text>
  <text x="20" y="246" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#5F5E5A">overflow → OutOfMemoryError</text>
</svg>
