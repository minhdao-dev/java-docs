<svg width="100%" style="max-width:220px" viewBox="0 0 380 263" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>while loop — execution flow</title>
  <desc>Check Condition first → execute Body → loop back, or Exit when false</desc>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5DCAA5" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E57373" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- START -->
  <rect x="80" y="20" width="140" height="34" rx="17"
    fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
  <text x="150" y="42" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#085041">START</text>

  <line x1="150" y1="54" x2="150" y2="82" stroke="#888" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- CONDITION diamond -->
  <polygon points="150,83 250,130 150,177 50,130"
    fill="#FFF3E0" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="150" y="124" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A" letter-spacing="1">① CONDITION</text>
  <text x="150" y="143" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="12" font-weight="500" fill="#E65100">condition ?</text>

  <!-- CONDITION → BODY (true) -->
  <line x1="150" y1="177" x2="150" y2="202" stroke="#5DCAA5" stroke-width="1.2" marker-end="url(#ag)"/>
  <text x="163" y="192" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#2E7D32">true</text>

  <!-- BODY -->
  <rect x="50" y="203" width="200" height="40" rx="8"
    fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="150" y="219" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A" letter-spacing="1">② BODY</text>
  <text x="150" y="236" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#2C2C2A">execute loop body</text>

  <!-- Loop back: Body left → Condition left -->
  <path d="M 50 223 L 18 223 L 18 130 L 50 130"
    fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- CONDITION → END (false) -->
  <line x1="250" y1="130" x2="272" y2="130" stroke="#E57373" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="261" y="118" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#C62828">false</text>

  <!-- END -->
  <rect x="274" y="113" width="90" height="34" rx="17"
    fill="#FDECEA" stroke="#E57373" stroke-width="0.8"/>
  <text x="319" y="135" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#C62828">END</text>
</svg>
