<svg width="100%" viewBox="0 0 720 390" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>JVM Heap — Generational Memory Layout</title>
  <desc>JVM Heap divided into Young Generation (Eden, S0, S1) and Old Generation with object promotion flow</desc>

  <defs>
    <marker id="hg-arr" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#0284C7" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="hg-arr-dark" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#1D4ED8" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="24" font-family="ui-sans-serif,sans-serif" font-size="16"
    font-weight="700" fill="#0284C7" text-anchor="middle">JVM Heap — Generational Memory Layout</text>

  <!-- ── Outer HEAP box ─────────────────────────────────────── -->
  <!-- x=12, y=36, w=696, h=226 → right=708, bottom=262 -->
  <rect x="12" y="36" width="696" height="226" rx="14"
    fill="#F0F9FF" stroke="#0EA5E9" stroke-width="2"/>
  <text x="360" y="57" font-family="ui-sans-serif,sans-serif" font-size="14"
    font-weight="700" fill="#0284C7" text-anchor="middle" letter-spacing="3">H E A P</text>

  <!-- ── Young Generation ──────────────────────────────────── -->
  <!-- x=24, y=64, w=458, h=184 → right=482, bottom=248 -->
  <rect x="24" y="64" width="458" height="184" rx="10"
    fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="253" y="83" font-family="ui-sans-serif,sans-serif" font-size="14"
    font-weight="700" fill="#0369A1" text-anchor="middle">Young Generation</text>
  <text x="253" y="99" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#0369A1" text-anchor="middle">Minor GC — fast, frequent</text>

  <!-- Eden Space: x=36, y=110, w=202, h=124 → right=238, bottom=234 -->
  <!-- Text evenly distributed: 110+28=138, +18=156, +18=174, +32=206 -->
  <rect x="36" y="110" width="202" height="124" rx="8"
    fill="#0EA5E9" stroke="#0284C7" stroke-width="1.5"/>
  <text x="137" y="138" font-family="ui-sans-serif,sans-serif" font-size="14"
    font-weight="700" fill="#fff" text-anchor="middle">Eden Space</text>
  <text x="137" y="157" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="rgba(255,255,255,0.92)" text-anchor="middle">New objects born here</text>
  <text x="137" y="175" font-family="ui-monospace,monospace" font-size="13"
    fill="rgba(255,255,255,0.85)" text-anchor="middle">new Object()</text>
  <text x="137" y="208" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="rgba(255,255,255,0.72)" text-anchor="middle">~70-80% of GC work</text>

  <!-- Survivor S0: x=266, y=110, w=104, h=58 → right=370, bottom=168 -->
  <rect x="266" y="110" width="104" height="58" rx="8"
    fill="#38BDF8" stroke="#0284C7" stroke-width="1.5"/>
  <text x="318" y="136" font-family="ui-sans-serif,sans-serif" font-size="18"
    font-weight="700" fill="#fff" text-anchor="middle">S0</text>
  <text x="318" y="156" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="rgba(255,255,255,0.88)" text-anchor="middle">Survivor</text>

  <!-- Survivor S1: x=266, y=176, w=104, h=58 → right=370, bottom=234 -->
  <rect x="266" y="176" width="104" height="58" rx="8"
    fill="#38BDF8" stroke="#0284C7" stroke-width="1.5"/>
  <text x="318" y="202" font-family="ui-sans-serif,sans-serif" font-size="18"
    font-weight="700" fill="#fff" text-anchor="middle">S1</text>
  <text x="318" y="222" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="rgba(255,255,255,0.88)" text-anchor="middle">Survivor</text>

  <!-- S-note: x=382..482, centered x=426 -->
  <!-- Vertical range: 120-224 — safely between S0 top (110) and S1 bottom (234) -->
  <text x="426" y="142" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#0369A1" text-anchor="middle">Survived &gt;= 1 GC</text>
  <text x="426" y="160" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#0369A1" text-anchor="middle">One active at a time</text>
  <!-- Small bracket lines connecting note to S boxes -->
  <line x1="374" y1="139" x2="382" y2="139" stroke="#38BDF8" stroke-width="1.2"/>
  <line x1="374" y1="205" x2="382" y2="205" stroke="#38BDF8" stroke-width="1.2"/>
  <line x1="374" y1="139" x2="374" y2="205" stroke="#38BDF8" stroke-width="1.2"/>

  <!-- ── Old Generation ─────────────────────────────────────── -->
  <!-- x=494, y=64, w=202, h=184 → right=696, bottom=248 -->
  <rect x="494" y="64" width="202" height="184" rx="10"
    fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="595" y="83" font-family="ui-sans-serif,sans-serif" font-size="14"
    font-weight="700" fill="#1D4ED8" text-anchor="middle">Old Generation</text>
  <text x="595" y="99" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#1D4ED8" text-anchor="middle">(Tenured)</text>

  <!-- Long-lived box: x=506, y=110, w=178, h=124 → right=684, bottom=234 -->
  <rect x="506" y="110" width="178" height="124" rx="8"
    fill="#3B82F6" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="595" y="150" font-family="ui-sans-serif,sans-serif" font-size="14"
    font-weight="700" fill="#fff" text-anchor="middle">Long-lived objects</text>
  <text x="595" y="170" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">Major GC</text>
  <text x="595" y="188" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">slow, infrequent</text>

  <!-- ── Arrow: Eden → S0 (Minor GC) ──────────────────────── -->
  <!-- Eden right=238, S0 left=266 → gap=28px, arrow at y=139 (S0 vertical center) -->
  <line x1="238" y1="139" x2="266" y2="139"
    stroke="#0284C7" stroke-width="2" marker-end="url(#hg-arr)"/>
  <text x="252" y="130" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="#0284C7" text-anchor="middle">GC</text>

  <!-- ── Arrow: S0/S1 → Old Gen (promote) ─────────────────── -->
  <!-- Arrow: (370,205) → (494,172). At x=490: y≈173.                       -->
  <!-- Label "promote" placed near ARROWHEAD (Old Gen side) at x=490, y=162 -->
  <!-- This clearly links label to the arrow endpoint, away from S-note.    -->
  <line x1="370" y1="205" x2="494" y2="172"
    stroke="#1D4ED8" stroke-width="2" marker-end="url(#hg-arr-dark)"/>
  <text x="488" y="163" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="600" fill="#1D4ED8" text-anchor="end">promote</text>

  <!-- ── Bottom annotations ────────────────────────────────── -->
  <!-- new Object() annotation -->
  <text x="137" y="278" font-family="ui-monospace,monospace" font-size="14"
    font-weight="700" fill="#0284C7" text-anchor="middle">new Object()</text>
  <!-- Arrow from y=282 up to Eden bottom (y=234), entering at y=236 -->
  <line x1="137" y1="282" x2="137" y2="236"
    stroke="#0284C7" stroke-width="1.8" marker-end="url(#hg-arr)"/>
  <text x="137" y="300" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#64748b" text-anchor="middle">allocated in Eden</text>

  <!-- Old Gen annotation -->
  <text x="580" y="278" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#1D4ED8" text-anchor="middle">Objects surviving 8+ GC cycles</text>
  <text x="580" y="296" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#1D4ED8" text-anchor="middle">are promoted to Old Gen</text>
  <text x="580" y="314" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#1D4ED8" text-anchor="middle">Full GC triggers when Old Gen fills up</text>
</svg>
