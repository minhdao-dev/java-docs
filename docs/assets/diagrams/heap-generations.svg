<svg width="100%" viewBox="0 0 720 310" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Heap Generations</title>
  <desc>JVM Heap divided into Young Generation (Eden, S0, S1) and Old Generation with object promotion flow</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0284C7" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Outer Heap container -->
  <rect x="14" y="14" width="692" height="224" rx="14"
    fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="360" y="36" font-family="ui-sans-serif,sans-serif" font-size="13"
    font-weight="700" fill="#0284C7" text-anchor="middle" letter-spacing="2">H E A P</text>

  <!-- Young Generation container -->
  <rect x="30" y="48" width="460" height="168" rx="10"
    fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.2"/>
  <text x="260" y="68" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="600" fill="#0369A1" text-anchor="middle">Young Generation</text>
  <text x="260" y="82" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#0369A1" text-anchor="middle">Minor GC — fast, frequent</text>

  <!-- Eden Space -->
  <rect x="46" y="92" width="228" height="106" rx="8"
    fill="#0EA5E9" stroke="#0284C7" stroke-width="1"/>
  <text x="160" y="120" font-family="ui-sans-serif,sans-serif" font-size="13"
    font-weight="700" fill="#fff" text-anchor="middle">Eden Space</text>
  <text x="160" y="138" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">New objects born here</text>
  <text x="160" y="154" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="rgba(255,255,255,0.8)" text-anchor="middle">new Object(), new int[]{}, …</text>
  <text x="160" y="188" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="rgba(255,255,255,0.75)" text-anchor="middle">~70–80% of GC work happens here</text>

  <!-- Survivor S0 -->
  <rect x="288" y="92" width="96" height="48" rx="8"
    fill="#38BDF8" stroke="#0284C7" stroke-width="1"/>
  <text x="336" y="113" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="600" fill="#fff" text-anchor="middle">S0</text>
  <text x="336" y="130" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">Survivor</text>

  <!-- Survivor S1 -->
  <rect x="394" y="92" width="96" height="48" rx="8"
    fill="#38BDF8" stroke="#0284C7" stroke-width="1"/>
  <text x="442" y="113" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="600" fill="#fff" text-anchor="middle">S1</text>
  <text x="442" y="130" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">Survivor</text>

  <!-- S0/S1 note -->
  <text x="341" y="164" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#0369A1" text-anchor="middle">Survived ≥ 1 GC</text>
  <text x="341" y="178" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#0369A1" text-anchor="middle">Only one active at a time</text>

  <!-- Old Generation container -->
  <rect x="506" y="48" width="184" height="168" rx="10"
    fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.2"/>
  <text x="598" y="68" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="600" fill="#1D4ED8" text-anchor="middle">Old Generation</text>
  <text x="598" y="82" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#1D4ED8" text-anchor="middle">(Tenured)</text>

  <rect x="520" y="92" width="156" height="106" rx="8"
    fill="#3B82F6" stroke="#1D4ED8" stroke-width="1"/>
  <text x="598" y="126" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="600" fill="#fff" text-anchor="middle">Long-lived</text>
  <text x="598" y="143" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">objects</text>
  <text x="598" y="162" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="rgba(255,255,255,0.8)" text-anchor="middle">Major GC — slow,</text>
  <text x="598" y="176" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="rgba(255,255,255,0.8)" text-anchor="middle">infrequent</text>

  <!-- Arrow: new object → Eden -->
  <line x1="160" y1="260" x2="160" y2="202"
    stroke="#0284C7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="160" y="278" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="#0284C7" text-anchor="middle" font-weight="600">new Object()</text>
  <text x="160" y="292" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#64748b" text-anchor="middle">allocated in Eden</text>

  <!-- Arrow: Eden → S0 -->
  <line x1="276" y1="116" x2="286" y2="116"
    stroke="#0284C7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: S0 → S1 (bidirectional, alternating) -->
  <path d="M384 108 Q389 100 394 108" fill="none"
    stroke="#0284C7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow: S0/S1 → Old Gen -->
  <line x1="492" y1="116" x2="516" y2="116"
    stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="504" y="108" font-family="ui-sans-serif,sans-serif" font-size="9"
    fill="#1D4ED8" text-anchor="middle">promote</text>

  <!-- GC label under Eden→S -->
  <text x="281" y="145" font-family="ui-sans-serif,sans-serif" font-size="9"
    fill="#0284C7" text-anchor="middle">Minor GC</text>
</svg>
