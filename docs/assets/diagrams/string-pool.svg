<svg width="100%" style="max-width:440px" viewBox="0 0 500 212" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>String Pool — literal vs new String()</title>
  <desc>String literals share one object in the String Pool; new String() always creates a separate object outside the pool</desc>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7BADE0" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- STACK: x=10 y=12 w=130 h=168 -->
  <rect x="10" y="12" width="130" height="168" rx="10"
    fill="#EEF4FB" stroke="#7BADE0" stroke-width="1.2"/>
  <text x="75" y="34" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="700"
    fill="#1A5296" letter-spacing="1.5">STACK</text>

  <!-- s1 slot -->
  <rect x="22" y="44" width="106" height="36" rx="6"
    fill="#fff" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="75" y="58" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A">String s1</text>
  <text x="75" y="74" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#1A5296">→ 0xA1</text>

  <!-- s2 slot -->
  <rect x="22" y="88" width="106" height="36" rx="6"
    fill="#fff" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="75" y="102" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A">String s2</text>
  <text x="75" y="118" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#1A5296">→ 0xA1</text>

  <!-- s3 slot -->
  <rect x="22" y="132" width="106" height="36" rx="6"
    fill="#fff" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="75" y="146" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A">String s3</text>
  <text x="75" y="162" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#1A5296">→ 0xB2</text>

  <!-- HEAP: x=155 y=12 w=330 h=186 -->
  <rect x="155" y="12" width="330" height="186" rx="10"
    fill="#FFF8EE" stroke="#FFB74D" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="320" y="34" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="700"
    fill="#E65100" letter-spacing="1.5">HEAP</text>

  <!-- String Pool inner: x=168 y=40 w=304 h=84 -->
  <rect x="168" y="40" width="304" height="84" rx="8"
    fill="#E8F5E9" stroke="#5DCAA5" stroke-width="0.8" stroke-dasharray="4 2"/>
  <text x="320" y="55" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" font-weight="700"
    fill="#085041" letter-spacing="0.5">String Pool</text>

  <!-- 0xA1 box inside pool: x=182 y=60 w=276 h=56 -->
  <rect x="182" y="60" width="276" height="56" rx="6"
    fill="#fff" stroke="#5DCAA5" stroke-width="0.8"/>
  <text x="198" y="76"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A">0xA1 — String literal</text>
  <text x="198" y="96"
    font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#085041">"Hello"</text>

  <!-- 0xB2 box outside pool: x=168 y=132 w=304 h=54 -->
  <rect x="168" y="132" width="304" height="56" rx="6"
    fill="#fff" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="184" y="150"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A">0xB2 — new String()</text>
  <text x="184" y="170"
    font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#E65100">"Hello"</text>

  <!-- Arrow s1 → 0xA1 -->
  <line x1="128" y1="62" x2="180" y2="76"
    stroke="#7BADE0" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Arrow s2 → 0xA1 (same target) -->
  <line x1="128" y1="106" x2="180" y2="88"
    stroke="#7BADE0" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Arrow s3 → 0xB2 -->
  <line x1="128" y1="150" x2="166" y2="158"
    stroke="#7BADE0" stroke-width="1.2" marker-end="url(#a)"/>
</svg>
