<svg width="100%" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Autoboxing and Integer Cache</title>
  <desc>Flow showing how Integer.valueOf() checks the cache (-128 to 127) before allocating a new object on the Heap</desc>

  <defs>
    <marker id="ac-arr" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#0284C7" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ac-arr-green" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#16A34A" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ac-arr-red" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#DC2626" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="24" font-family="ui-sans-serif,sans-serif" font-size="16"
    font-weight="700" fill="#0284C7" text-anchor="middle">Autoboxing — Integer.valueOf() Flow</text>

  <!-- ── Step 1: primitive int ────────────────────────────── -->
  <!-- x=14, y=38, w=120, h=72 → right=134, bottom=110 -->
  <rect x="14" y="38" width="120" height="72" rx="8"
    fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="74" y="61" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#92400E" text-anchor="middle">primitive</text>
  <text x="74" y="82" font-family="ui-monospace,monospace" font-size="17"
    font-weight="700" fill="#B45309" text-anchor="middle">int n</text>
  <text x="74" y="100" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#92400E" text-anchor="middle">e.g. 42 or 200</text>

  <!-- Arrow: int → valueOf  (right of primitive box to left of decision box) -->
  <!-- Gap: primitive right=134, decision left=170 → 36px gap, y=74 -->
  <line x1="134" y1="74" x2="170" y2="74"
    stroke="#0284C7" stroke-width="2" marker-end="url(#ac-arr)"/>
  <text x="152" y="65" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="#64748b" text-anchor="middle">autobox</text>

  <!-- ── Step 2: Integer.valueOf() decision box ────────────── -->
  <!-- x=170, y=28, w=220, h=94 → right=390, bottom=122 -->
  <!-- Gap between this box right (390) and Heap box left (420): 30px -->
  <rect x="170" y="28" width="220" height="94" rx="10"
    fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2"/>
  <text x="280" y="54" font-family="ui-monospace,monospace" font-size="14"
    font-weight="700" fill="#0284C7" text-anchor="middle">Integer.valueOf(n)</text>
  <text x="280" y="74" font-family="ui-sans-serif,sans-serif" font-size="14"
    fill="#0369A1" text-anchor="middle">Is  -128 &lt;= n &lt;= 127 ?</text>
  <text x="280" y="112" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#64748b" text-anchor="middle">JVM integer cache range</text>

  <!-- ── YES branch → Cache ────────────────────────────────── -->
  <!-- Arrow from decision box bottom-left (220,122) to Cache top-center (170,186) -->
  <!-- At y=154 (midpoint): arrow x = 220 + (170-220)*(154-122)/(186-122) = 220-25 = 195 -->
  <!-- Label at x=162, y=151, text-anchor="end" → ends at x=162, gap from arrow x≈195: 33px ✓ -->
  <line x1="220" y1="122" x2="170" y2="186"
    stroke="#16A34A" stroke-width="2" marker-end="url(#ac-arr-green)"/>
  <text x="162" y="151" font-family="ui-sans-serif,sans-serif" font-size="14"
    fill="#16A34A" font-weight="700" text-anchor="end">YES</text>

  <!-- ── NO branch → Heap ──────────────────────────────────── -->
  <!-- Arrow from decision box bottom-right (340,122) to Heap top-center (510,186) -->
  <!-- At y=154: arrow x = 340 + (510-340)*(154-122)/(186-122) = 340+85 = 425 -->
  <!-- Label at x=438, y=151, text-anchor="start" → starts at 438, gap from arrow≈425: 13px ✓ -->
  <line x1="340" y1="122" x2="510" y2="186"
    stroke="#DC2626" stroke-width="2" marker-end="url(#ac-arr-red)"/>
  <text x="438" y="151" font-family="ui-sans-serif,sans-serif" font-size="14"
    fill="#DC2626" font-weight="700" text-anchor="start">NO</text>

  <!-- ── Cache box ─────────────────────────────────────────── -->
  <!-- x=14, y=186, w=312, h=108 → right=326, bottom=294 -->
  <rect x="14" y="186" width="312" height="108" rx="10"
    fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="170" y="211" font-family="ui-sans-serif,sans-serif" font-size="14"
    font-weight="700" fill="#15803D" text-anchor="middle">Integer Cache  (static)</text>
  <text x="170" y="232" font-family="ui-monospace,monospace" font-size="14"
    fill="#166534" text-anchor="middle">Integer[-128 .. 127]</text>
  <text x="170" y="252" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#16A34A" text-anchor="middle">pre-allocated at JVM startup</text>
  <text x="170" y="271" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#64748b" text-anchor="middle">returns existing object — no allocation</text>

  <!-- ── Heap box ──────────────────────────────────────────── -->
  <!-- x=408, y=186, w=298, h=108 → right=706, bottom=294 -->
  <!-- Gap from Cache right (326) and Heap left (408) = 82px (decision box sits here) -->
  <!-- Gap from decision right (390) and Heap left (408) = 18px ✓ -->
  <rect x="408" y="186" width="298" height="108" rx="10"
    fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="557" y="211" font-family="ui-sans-serif,sans-serif" font-size="14"
    font-weight="700" fill="#B91C1C" text-anchor="middle">Heap — new Integer object</text>
  <text x="557" y="232" font-family="ui-monospace,monospace" font-size="14"
    fill="#991B1B" text-anchor="middle">new Integer(n)</text>
  <text x="557" y="252" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#DC2626" text-anchor="middle">fresh allocation every time</text>
  <text x="557" y="271" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#64748b" text-anchor="middle">== returns false between calls</text>

  <!-- ── Consequence note boxes ────────────────────────────── -->
  <!-- Cache side: x=14, y=308, w=312, h=32 → bottom=340 -->
  <rect x="14" y="308" width="312" height="32" rx="6"
    fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="170" y="329" font-family="ui-monospace,monospace" font-size="13"
    fill="#15803D" text-anchor="middle">a=42, b=42  -&gt;  a==b  is true  (same object)</text>

  <!-- Heap side: x=408, y=308, w=298, h=32 → bottom=340, right=706 ✓ -->
  <rect x="408" y="308" width="298" height="32" rx="6"
    fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="557" y="329" font-family="ui-monospace,monospace" font-size="13"
    fill="#B91C1C" text-anchor="middle">x=200, y=200  -&gt;  x==y  is false</text>
</svg>
