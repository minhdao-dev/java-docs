<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Autoboxing and Integer Cache</title>
  <desc>Flow showing how Integer.valueOf() checks the cache (-128 to 127) before allocating a new object on the Heap</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0284C7" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#16A34A" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#DC2626" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="22" font-family="ui-sans-serif,sans-serif" font-size="13"
    font-weight="700" fill="#0284C7" text-anchor="middle">Autoboxing — Integer.valueOf() Flow</text>

  <!-- Step 1: primitive int -->
  <rect x="14" y="38" width="110" height="60" rx="8"
    fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="69" y="60" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#92400E" text-anchor="middle">primitive</text>
  <text x="69" y="78" font-family="ui-monospace,monospace" font-size="15"
    font-weight="700" fill="#B45309" text-anchor="middle">int n</text>
  <text x="69" y="92" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#92400E" text-anchor="middle">e.g. 42 or 200</text>

  <!-- Arrow to valueOf -->
  <line x1="124" y1="68" x2="170" y2="68"
    stroke="#0284C7" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="147" y="62" font-family="ui-sans-serif,sans-serif" font-size="9"
    fill="#64748b" text-anchor="middle">autobox</text>

  <!-- Step 2: Integer.valueOf() decision -->
  <rect x="172" y="28" width="176" height="80" rx="10"
    fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.8"/>
  <text x="260" y="52" font-family="ui-monospace,monospace" font-size="12"
    font-weight="700" fill="#0284C7" text-anchor="middle">Integer.valueOf(n)</text>
  <text x="260" y="70" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="#0369A1" text-anchor="middle">Is -128 ≤ n ≤ 127 ?</text>
  <text x="260" y="88" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#64748b" text-anchor="middle">JVM integer cache range</text>

  <!-- YES branch — down-left to cache -->
  <line x1="210" y1="108" x2="160" y2="148"
    stroke="#16A34A" stroke-width="1.6" marker-end="url(#arr-green)"/>
  <text x="170" y="132" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="#16A34A" font-weight="600">YES</text>

  <!-- NO branch — down-right to heap -->
  <line x1="312" y1="108" x2="370" y2="148"
    stroke="#DC2626" stroke-width="1.6" marker-end="url(#arr-red)"/>
  <text x="355" y="132" font-family="ui-sans-serif,sans-serif" font-size="11"
    fill="#DC2626" font-weight="600">NO</text>

  <!-- Cache box -->
  <rect x="14" y="150" width="280" height="84" rx="10"
    fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="154" y="172" font-family="ui-sans-serif,sans-serif" font-size="11"
    font-weight="700" fill="#15803D" text-anchor="middle">Integer Cache (static)</text>
  <text x="154" y="190" font-family="ui-monospace,monospace" font-size="11"
    fill="#166534" text-anchor="middle">Integer[-128..127]</text>
  <text x="154" y="208" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#16A34A" text-anchor="middle">pre-allocated at JVM startup</text>
  <text x="154" y="224" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#64748b" text-anchor="middle">return existing object — no allocation</text>

  <!-- Heap box -->
  <rect x="370" y="150" width="296" height="84" rx="10"
    fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="518" y="172" font-family="ui-sans-serif,sans-serif" font-size="11"
    font-weight="700" fill="#B91C1C" text-anchor="middle">Heap — new Integer object</text>
  <text x="518" y="190" font-family="ui-monospace,monospace" font-size="11"
    fill="#991B1B" text-anchor="middle">new Integer(n)</text>
  <text x="518" y="208" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#DC2626" text-anchor="middle">fresh allocation every time</text>
  <text x="518" y="224" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#64748b" text-anchor="middle">== returns false between two calls</text>

  <!-- Consequence note -->
  <rect x="14" y="246" width="652" height="0" rx="0"/>
  <text x="178" y="252" font-family="ui-monospace,monospace" font-size="11"
    fill="#15803D">Integer a = 42, b = 42 → a == b  ✓ (same cached object)</text>
  <text x="370" y="252" font-family="ui-monospace,monospace" font-size="11"
    fill="#B91C1C">Integer x = 200, y = 200 → x == y  ✗ (different objects)</text>
</svg>
