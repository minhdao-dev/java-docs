<svg width="100%" style="max-width:240px" viewBox="0 0 410 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>for loop — execution flow</title>
  <desc>Init once → check Condition → execute Body → Update → loop back or Exit</desc>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5DCAA5" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E57373" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- START -->
  <rect x="90" y="20" width="140" height="34" rx="17"
    fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
  <text x="160" y="42" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#085041">START</text>

  <line x1="160" y1="54" x2="160" y2="83" stroke="#888" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- INIT -->
  <rect x="60" y="84" width="200" height="44" rx="8"
    fill="#EEF4FB" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="160" y="101" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A" letter-spacing="1">① INIT</text>
  <text x="160" y="119" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="12" font-weight="500" fill="#1A5296">int i = 0</text>

  <line x1="160" y1="128" x2="160" y2="153" stroke="#888" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- CONDITION diamond -->
  <polygon points="160,153 260,196 160,239 60,196"
    fill="#FFF3E0" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="160" y="190" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A" letter-spacing="1">② CONDITION</text>
  <text x="160" y="209" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="12" font-weight="500" fill="#E65100">i &lt; n ?</text>

  <!-- CONDITION → BODY (true) -->
  <line x1="160" y1="239" x2="160" y2="264" stroke="#5DCAA5" stroke-width="1.2" marker-end="url(#ag)"/>
  <text x="173" y="255" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#2E7D32">true</text>

  <!-- BODY -->
  <rect x="60" y="265" width="200" height="40" rx="8"
    fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="160" y="281" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A" letter-spacing="1">③ BODY</text>
  <text x="160" y="298" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#2C2C2A">execute loop body</text>

  <line x1="160" y1="305" x2="160" y2="335" stroke="#888" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- UPDATE -->
  <rect x="60" y="336" width="200" height="44" rx="8"
    fill="#EEF4FB" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="160" y="353" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#5F5E5A" letter-spacing="1">④ UPDATE</text>
  <text x="160" y="371" text-anchor="middle"
    font-family="ui-monospace,monospace" font-size="12" font-weight="500" fill="#1A5296">i++</text>

  <!-- Loop back: Update left → Condition left -->
  <path d="M 60 358 L 22 358 L 22 196 L 60 196"
    fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- CONDITION → END (false) -->
  <line x1="260" y1="196" x2="282" y2="196" stroke="#E57373" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="271" y="184" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="10" fill="#C62828">false</text>

  <!-- END -->
  <rect x="284" y="179" width="100" height="34" rx="17"
    fill="#FDECEA" stroke="#E57373" stroke-width="0.8"/>
  <text x="334" y="201" text-anchor="middle"
    font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#C62828">END</text>
</svg>
