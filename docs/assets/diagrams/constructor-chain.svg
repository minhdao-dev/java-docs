<svg width="100%" viewBox="0 0 700 230" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Constructor Chaining with this()</title>
  <desc>Shows how new Rectangle() delegates to this(1,1) which delegates to Rectangle(int,int)</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0284C7" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="22" font-family="ui-sans-serif,sans-serif" font-size="13"
    font-weight="700" fill="#0284C7" text-anchor="middle">Constructor Chaining via this()</text>

  <!-- Box 1: Call site -->
  <rect x="14" y="38" width="148" height="60" rx="10"
    fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="88" y="58" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#64748b" text-anchor="middle">call site</text>
  <text x="88" y="76" font-family="ui-monospace,monospace" font-size="13"
    font-weight="700" fill="#0284C7" text-anchor="middle">new Rectangle()</text>
  <text x="88" y="90" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#94a3b8" text-anchor="middle">zero args</text>

  <!-- Arrow 1 -->
  <line x1="162" y1="68" x2="218" y2="68"
    stroke="#0284C7" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="190" y="62" font-family="ui-monospace,monospace" font-size="10"
    fill="#0284C7" text-anchor="middle">this(1, 1)</text>

  <!-- Box 2: Rectangle() -->
  <rect x="220" y="38" width="172" height="100" rx="10"
    fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="306" y="58" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#0369A1" text-anchor="middle" font-weight="600">Rectangle()</text>
  <text x="306" y="75" font-family="ui-monospace,monospace" font-size="11"
    fill="#0369A1" text-anchor="middle">this(1, 1);</text>
  <text x="306" y="92" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#64748b" text-anchor="middle">delegates to</text>
  <text x="306" y="106" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#64748b" text-anchor="middle">Rectangle(int, int)</text>
  <text x="306" y="130" font-family="ui-sans-serif,sans-serif" font-size="9"
    fill="#0369A1" text-anchor="middle">Square shortcut: 1×1</text>

  <!-- Arrow 2 -->
  <line x1="392" y1="68" x2="448" y2="68"
    stroke="#0284C7" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="420" y="62" font-family="ui-monospace,monospace" font-size="10"
    fill="#0284C7" text-anchor="middle">this(5, 5)</text>

  <!-- Box 2b: Rectangle(int side) -->
  <rect x="220" y="152" width="172" height="60" rx="10"
    fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="306" y="172" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#0369A1" text-anchor="middle" font-weight="600">Rectangle(int side)</text>
  <text x="306" y="189" font-family="ui-monospace,monospace" font-size="11"
    fill="#0369A1" text-anchor="middle">this(side, side);</text>
  <text x="306" y="203" font-family="ui-sans-serif,sans-serif" font-size="9"
    fill="#64748b" text-anchor="middle">Square shortcut: N×N</text>

  <!-- Arrow from side box to main -->
  <line x1="392" y1="182" x2="448" y2="100"
    stroke="#0284C7" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Box 3: Rectangle(int w, int h) — the canonical constructor -->
  <rect x="450" y="38" width="234" height="134" rx="10"
    fill="#0EA5E9" stroke="#0284C7" stroke-width="1.5"/>
  <text x="567" y="60" font-family="ui-sans-serif,sans-serif" font-size="11"
    font-weight="700" fill="#fff" text-anchor="middle">Rectangle(int w, int h)</text>
  <text x="567" y="78" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="rgba(255,255,255,0.85)" text-anchor="middle">canonical constructor</text>
  <line x1="466" y1="88" x2="672" y2="88" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <text x="567" y="104" font-family="ui-monospace,monospace" font-size="11"
    fill="#fff" text-anchor="middle">this.width  = w;</text>
  <text x="567" y="120" font-family="ui-monospace,monospace" font-size="11"
    fill="#fff" text-anchor="middle">this.height = h;</text>
  <text x="567" y="144" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">All validation lives here.</text>
  <text x="567" y="158" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">Change once, applies to all.</text>

  <!-- Result note -->
  <text x="350" y="200" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#0369A1" text-anchor="middle">new Rectangle()  →  w=1, h=1</text>
  <text x="350" y="215" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#0369A1" text-anchor="middle">new Rectangle(5)  →  w=5, h=5</text>
</svg>
