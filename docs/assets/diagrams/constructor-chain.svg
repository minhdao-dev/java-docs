<svg width="100%" viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" role="img" style="max-width:820px">
  <title>Constructor Chaining with this()</title>
  <desc>Shows how Rectangle() and Rectangle(int side) both delegate to the canonical Rectangle(int w, int h) constructor</desc>

  <defs>
    <marker id="cc-arr" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#0284C7" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="24" font-family="ui-sans-serif,sans-serif" font-size="16"
    font-weight="700" fill="#0284C7" text-anchor="middle">Constructor Chaining via this()</text>

  <!-- ══ COLUMN 1: Call sites ══════════════════════════════════════ -->

  <!-- Box A: new Rectangle()  x=14, y=42, w=168, h=76 → right=182, bottom=118 -->
  <rect x="14" y="42" width="168" height="76" rx="10"
    fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="98" y="64" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#64748b" text-anchor="middle">call site</text>
  <text x="98" y="86" font-family="ui-monospace,monospace" font-size="14"
    font-weight="700" fill="#0284C7" text-anchor="middle">new Rectangle()</text>
  <text x="98" y="107" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#94a3b8" text-anchor="middle">zero args</text>

  <!-- Box B: new Rectangle(5)  x=14, y=158, w=168, h=76 → right=182, bottom=234 -->
  <rect x="14" y="158" width="168" height="76" rx="10"
    fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="98" y="180" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#64748b" text-anchor="middle">call site</text>
  <text x="98" y="202" font-family="ui-monospace,monospace" font-size="14"
    font-weight="700" fill="#0284C7" text-anchor="middle">new Rectangle(5)</text>
  <text x="98" y="223" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#94a3b8" text-anchor="middle">one arg (square)</text>

  <!-- ══ COLUMN 2: Delegating constructors ═════════════════════════ -->
  <!-- Gap from col1 right (182) to col2 left (248) = 66px → "calls" label fits -->

  <!-- Box C: Rectangle() body  x=248, y=42, w=196, h=76 → right=444, bottom=118 -->
  <rect x="248" y="42" width="196" height="76" rx="10"
    fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="346" y="64" font-family="ui-sans-serif,sans-serif" font-size="14"
    fill="#0369A1" text-anchor="middle" font-weight="700">Rectangle()</text>
  <text x="346" y="86" font-family="ui-monospace,monospace" font-size="14"
    fill="#0369A1" text-anchor="middle">this(1, 1);</text>
  <text x="346" y="107" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#64748b" text-anchor="middle">delegates to canonical</text>

  <!-- Box D: Rectangle(int side)  x=248, y=158, w=196, h=76 → right=444, bottom=234 -->
  <rect x="248" y="158" width="196" height="76" rx="10"
    fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="346" y="180" font-family="ui-sans-serif,sans-serif" font-size="14"
    fill="#0369A1" text-anchor="middle" font-weight="700">Rectangle(int side)</text>
  <text x="346" y="202" font-family="ui-monospace,monospace" font-size="14"
    fill="#0369A1" text-anchor="middle">this(side, side);</text>
  <text x="346" y="223" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#64748b" text-anchor="middle">delegates to canonical</text>

  <!-- ══ COLUMN 3: Canonical constructor ═══════════════════════════ -->
  <!-- Gap from col2 right (444) to col3 left (548) = 104px → arrow labels fit -->

  <!-- Box E: Rectangle(int w, int h)  x=548, y=76, w=258, h=116 → right=806, bottom=192 -->
  <rect x="548" y="76" width="258" height="116" rx="10"
    fill="#0EA5E9" stroke="#0284C7" stroke-width="1.5"/>
  <text x="677" y="100" font-family="ui-sans-serif,sans-serif" font-size="14"
    font-weight="700" fill="#fff" text-anchor="middle">Rectangle(int w, int h)</text>
  <text x="677" y="119" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="rgba(255,255,255,0.85)" text-anchor="middle">canonical constructor</text>
  <line x1="562" y1="129" x2="792" y2="129"
    stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="677" y="150" font-family="ui-monospace,monospace" font-size="14"
    fill="#fff" text-anchor="middle">this.width  = w;</text>
  <text x="677" y="171" font-family="ui-monospace,monospace" font-size="14"
    fill="#fff" text-anchor="middle">this.height = h;</text>

  <!-- ══ Arrows: Col1 → Col2 ════════════════════════════════════════ -->
  <!-- A → C: gap 182..248=66px, y=80 -->
  <line x1="182" y1="80" x2="248" y2="80"
    stroke="#0284C7" stroke-width="2" marker-end="url(#cc-arr)"/>
  <text x="215" y="70" font-family="ui-monospace,monospace" font-size="12"
    fill="#0284C7" text-anchor="middle">calls</text>

  <!-- B → D: gap 182..248=66px, y=196 -->
  <line x1="182" y1="196" x2="248" y2="196"
    stroke="#0284C7" stroke-width="2" marker-end="url(#cc-arr)"/>
  <text x="215" y="186" font-family="ui-monospace,monospace" font-size="12"
    fill="#0284C7" text-anchor="middle">calls</text>

  <!-- ══ Arrows: Col2 → Col3 ════════════════════════════════════════ -->
  <!-- C → E: from (444, 80) to (548, 118)                           -->
  <!--   Gap zone x=448..544 = 96px. Arrow at midpoint (496,99).    -->
  <!--   Label "this(1,1)" at x=496, y=68 — ABOVE arrow start (y=80)-->
  <!--   At y=68 there is no arrow line. Label span at font-size=13: -->
  <!--   9 chars * ~8px = 72px centered at 496 → spans 460..532.    -->
  <!--   460 > 448 and 532 < 544 → fully inside gap zone.  ✓        -->
  <line x1="444" y1="80" x2="548" y2="118"
    stroke="#0284C7" stroke-width="2" marker-end="url(#cc-arr)"/>
  <text x="496" y="68" font-family="ui-monospace,monospace" font-size="13"
    fill="#0284C7" text-anchor="middle">this(1,1)</text>

  <!-- D → E: from (444, 196) to (548, 152)                          -->
  <!--   Arrow goes up-right. Label "this(n,n)" BELOW arrow start.   -->
  <!--   At y=209 (13px below arrow start y=196), no arrow line.     -->
  <!--   Label centered at x=496, y=209. Span 460..532 in gap. ✓    -->
  <line x1="444" y1="196" x2="548" y2="152"
    stroke="#0284C7" stroke-width="2" marker-end="url(#cc-arr)"/>
  <text x="496" y="209" font-family="ui-monospace,monospace" font-size="13"
    fill="#0284C7" text-anchor="middle">this(n,n)</text>

  <!-- ══ Bottom note ════════════════════════════════════════════════ -->
  <text x="410" y="258" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#0369A1" text-anchor="middle">All validation lives in one place — change once, applies everywhere.</text>
  <text x="410" y="279" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#0369A1" text-anchor="middle">new Rectangle()  →  w=1, h=1          new Rectangle(5)  →  w=5, h=5</text>
</svg>
