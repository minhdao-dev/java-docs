<svg width="100%" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>2D Array Memory Layout in Java</title>
  <desc>Java 2D array stored as array of references on the Heap — not contiguous like C/C++</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0284C7" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── STACK ── -->
  <rect x="14" y="14" width="148" height="272" rx="12"
    fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="88" y="36" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="700" fill="#92400E" text-anchor="middle">Stack</text>

  <!-- matrix variable -->
  <rect x="28" y="48" width="120" height="44" rx="6"
    fill="#FDE68A" stroke="#F59E0B" stroke-width="1"/>
  <text x="88" y="66" font-family="ui-monospace,monospace" font-size="12"
    font-weight="600" fill="#78350F" text-anchor="middle">int[][] grid</text>
  <text x="88" y="82" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#92400E" text-anchor="middle">ref → 0x1A00</text>

  <!-- ── HEAP ── -->
  <rect x="186" y="14" width="500" height="272" rx="12"
    fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.2"/>
  <text x="436" y="36" font-family="ui-sans-serif,sans-serif" font-size="12"
    font-weight="700" fill="#0284C7" text-anchor="middle">Heap</text>

  <!-- Reference array (the "outer" array) -->
  <rect x="204" y="50" width="128" height="212" rx="8"
    fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.2"/>
  <text x="268" y="69" font-family="ui-monospace,monospace" font-size="10"
    fill="#0369A1" text-anchor="middle">0x1A00</text>

  <rect x="216" y="76" width="104" height="36" rx="5"
    fill="#0EA5E9" stroke="#0284C7" stroke-width="0.8"/>
  <text x="268" y="89" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#fff" text-anchor="middle">ref → 0x2A00</text>
  <text x="268" y="102" font-family="ui-sans-serif,sans-serif" font-size="9"
    fill="rgba(255,255,255,0.85)" text-anchor="middle">[0] row 0</text>

  <rect x="216" y="122" width="104" height="36" rx="5"
    fill="#0EA5E9" stroke="#0284C7" stroke-width="0.8"/>
  <text x="268" y="135" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#fff" text-anchor="middle">ref → 0x2B00</text>
  <text x="268" y="148" font-family="ui-sans-serif,sans-serif" font-size="9"
    fill="rgba(255,255,255,0.85)" text-anchor="middle">[1] row 1</text>

  <rect x="216" y="168" width="104" height="36" rx="5"
    fill="#0EA5E9" stroke="#0284C7" stroke-width="0.8"/>
  <text x="268" y="181" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#fff" text-anchor="middle">ref → 0x2C00</text>
  <text x="268" y="194" font-family="ui-sans-serif,sans-serif" font-size="9"
    fill="rgba(255,255,255,0.85)" text-anchor="middle">[2] row 2</text>

  <text x="268" y="244" font-family="ui-sans-serif,sans-serif" font-size="9"
    fill="#0369A1" text-anchor="middle">array of</text>
  <text x="268" y="256" font-family="ui-sans-serif,sans-serif" font-size="9"
    fill="#0369A1" text-anchor="middle">references</text>

  <!-- Row 0 -->
  <rect x="380" y="62" width="284" height="46" rx="8"
    fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.2"/>
  <text x="394" y="76" font-family="ui-monospace,monospace" font-size="9"
    fill="#1D4ED8">0x2A00</text>
  <rect x="400" y="80" width="52" height="22" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="426" y="95" font-family="ui-monospace,monospace" font-size="12" fill="#fff" text-anchor="middle">1</text>
  <rect x="458" y="80" width="52" height="22" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="484" y="95" font-family="ui-monospace,monospace" font-size="12" fill="#fff" text-anchor="middle">2</text>
  <rect x="516" y="80" width="52" height="22" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="542" y="95" font-family="ui-monospace,monospace" font-size="12" fill="#fff" text-anchor="middle">3</text>
  <text x="630" y="89" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#1D4ED8">row 0</text>

  <!-- Row 1 -->
  <rect x="380" y="122" width="284" height="46" rx="8"
    fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.2"/>
  <text x="394" y="136" font-family="ui-monospace,monospace" font-size="9"
    fill="#1D4ED8">0x2B00</text>
  <rect x="400" y="140" width="52" height="22" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="426" y="155" font-family="ui-monospace,monospace" font-size="12" fill="#fff" text-anchor="middle">4</text>
  <rect x="458" y="140" width="52" height="22" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="484" y="155" font-family="ui-monospace,monospace" font-size="12" fill="#fff" text-anchor="middle">5</text>
  <rect x="516" y="140" width="52" height="22" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="542" y="155" font-family="ui-monospace,monospace" font-size="12" fill="#fff" text-anchor="middle">6</text>
  <text x="630" y="149" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#1D4ED8">row 1</text>

  <!-- Row 2 -->
  <rect x="380" y="182" width="284" height="46" rx="8"
    fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.2"/>
  <text x="394" y="196" font-family="ui-monospace,monospace" font-size="9"
    fill="#1D4ED8">0x2C00</text>
  <rect x="400" y="200" width="52" height="22" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="426" y="215" font-family="ui-monospace,monospace" font-size="12" fill="#fff" text-anchor="middle">7</text>
  <rect x="458" y="200" width="52" height="22" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="484" y="215" font-family="ui-monospace,monospace" font-size="12" fill="#fff" text-anchor="middle">8</text>
  <rect x="516" y="200" width="52" height="22" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="542" y="215" font-family="ui-monospace,monospace" font-size="12" fill="#fff" text-anchor="middle">9</text>
  <text x="630" y="209" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#1D4ED8">row 2</text>

  <!-- Arrow: Stack → ref array -->
  <line x1="148" y1="70" x2="202" y2="94"
    stroke="#0284C7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrows: ref array → rows -->
  <line x1="322" y1="94" x2="378" y2="85"
    stroke="#0284C7" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="322" y1="140" x2="378" y2="145"
    stroke="#0284C7" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="322" y1="186" x2="378" y2="205"
    stroke="#0284C7" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Note at bottom -->
  <text x="436" y="255" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#0369A1" text-anchor="middle">⚠ Rows are NOT contiguous in memory — each row is a separate object on the Heap</text>
  <text x="436" y="270" font-family="ui-sans-serif,sans-serif" font-size="10"
    fill="#64748b" text-anchor="middle">Unlike C/C++ where int[3][4] is one flat block of 48 bytes</text>
</svg>
