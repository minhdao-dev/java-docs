<svg width="100%" viewBox="0 0 720 350" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>2D Array Memory Layout in Java</title>
  <desc>Java 2D array stored as an array of references on the Heap — rows are NOT contiguous like C/C++</desc>

  <defs>
    <marker id="al-arr" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#0284C7" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="al-arr-teal" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#0369A1" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── STACK ─────────────────────────────────────────────── -->
  <rect x="14" y="14" width="154" height="260" rx="12"
    fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="91" y="38" font-family="ui-sans-serif,sans-serif" font-size="15"
    font-weight="700" fill="#92400E" text-anchor="middle">Stack</text>

  <!-- grid variable cell -->
  <rect x="28" y="52" width="126" height="54" rx="8"
    fill="#FDE68A" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="91" y="73" font-family="ui-monospace,monospace" font-size="14"
    font-weight="700" fill="#78350F" text-anchor="middle">int[][] grid</text>
  <text x="91" y="93" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#92400E" text-anchor="middle">ref &#x2192; 0x1A00</text>

  <!-- ── HEAP ───────────────────────────────────────────────── -->
  <rect x="188" y="14" width="518" height="260" rx="12"
    fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="447" y="38" font-family="ui-sans-serif,sans-serif" font-size="15"
    font-weight="700" fill="#0284C7" text-anchor="middle">Heap</text>

  <!-- Reference array box (outer, 0x1A00) -->
  <rect x="204" y="52" width="140" height="210" rx="8"
    fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.2"/>
  <!-- Hex address — 13px -->
  <text x="274" y="72" font-family="ui-monospace,monospace" font-size="13"
    font-weight="600" fill="#0369A1" text-anchor="middle">0x1A00</text>

  <!-- Left bracket indicating the 3 ref cells = "array of refs" -->
  <!-- Bracket at x=208-213, spanning y=82..234 (top of ref[0] to bottom of ref[2]) -->
  <path d="M213 82 L208 82 L208 234 L213 234"
    fill="none" stroke="#0369A1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Connector from bracket midpoint down to label area -->
  <path d="M208 234 L208 246"
    fill="none" stroke="#0369A1" stroke-width="1.2" marker-end="url(#al-arr-teal)"/>

  <!-- ref[0] — 0x2A00 -->
  <rect x="216" y="82" width="116" height="44" rx="6"
    fill="#0EA5E9" stroke="#0284C7" stroke-width="1"/>
  <!-- hex 13px -->
  <text x="274" y="100" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#fff" text-anchor="middle">ref &#x2192; 0x2A00</text>
  <text x="274" y="118" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">[0] row 0</text>

  <!-- ref[1] — 0x2B00 -->
  <rect x="216" y="136" width="116" height="44" rx="6"
    fill="#0EA5E9" stroke="#0284C7" stroke-width="1"/>
  <text x="274" y="154" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#fff" text-anchor="middle">ref &#x2192; 0x2B00</text>
  <text x="274" y="172" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">[1] row 1</text>

  <!-- ref[2] — 0x2C00 -->
  <rect x="216" y="190" width="116" height="44" rx="6"
    fill="#0EA5E9" stroke="#0284C7" stroke-width="1"/>
  <text x="274" y="208" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#fff" text-anchor="middle">ref &#x2192; 0x2C00</text>
  <text x="274" y="226" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="rgba(255,255,255,0.9)" text-anchor="middle">[2] row 2</text>

  <!-- "array of refs" label at bracket bottom -->
  <text x="240" y="258" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#0369A1" text-anchor="middle">array of refs</text>

  <!-- ── Row 0 at 0x2A00 ────────────────────────────────────── -->
  <rect x="388" y="60" width="300" height="56" rx="8"
    fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.2"/>
  <!-- hex 13px -->
  <text x="402" y="76" font-family="ui-monospace,monospace" font-size="13"
    font-weight="600" fill="#1D4ED8">0x2A00</text>
  <!-- number boxes — darker blue for better contrast -->
  <rect x="414" y="82" width="60" height="26" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="0.8"/>
  <text x="444" y="100" font-family="ui-monospace,monospace" font-size="15"
    font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <rect x="480" y="82" width="60" height="26" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="0.8"/>
  <text x="510" y="100" font-family="ui-monospace,monospace" font-size="15"
    font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <rect x="546" y="82" width="60" height="26" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="0.8"/>
  <text x="576" y="100" font-family="ui-monospace,monospace" font-size="15"
    font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="660" y="97" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#1D4ED8">row 0</text>

  <!-- ── Row 1 at 0x2B00 ────────────────────────────────────── -->
  <rect x="388" y="130" width="300" height="56" rx="8"
    fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.2"/>
  <text x="402" y="146" font-family="ui-monospace,monospace" font-size="13"
    font-weight="600" fill="#1D4ED8">0x2B00</text>
  <rect x="414" y="152" width="60" height="26" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="0.8"/>
  <text x="444" y="170" font-family="ui-monospace,monospace" font-size="15"
    font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <rect x="480" y="152" width="60" height="26" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="0.8"/>
  <text x="510" y="170" font-family="ui-monospace,monospace" font-size="15"
    font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <rect x="546" y="152" width="60" height="26" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="0.8"/>
  <text x="576" y="170" font-family="ui-monospace,monospace" font-size="15"
    font-weight="700" fill="#fff" text-anchor="middle">6</text>
  <text x="660" y="167" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#1D4ED8">row 1</text>

  <!-- ── Row 2 at 0x2C00 ────────────────────────────────────── -->
  <rect x="388" y="200" width="300" height="56" rx="8"
    fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.2"/>
  <text x="402" y="216" font-family="ui-monospace,monospace" font-size="13"
    font-weight="600" fill="#1D4ED8">0x2C00</text>
  <rect x="414" y="222" width="60" height="26" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="0.8"/>
  <text x="444" y="240" font-family="ui-monospace,monospace" font-size="15"
    font-weight="700" fill="#fff" text-anchor="middle">7</text>
  <rect x="480" y="222" width="60" height="26" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="0.8"/>
  <text x="510" y="240" font-family="ui-monospace,monospace" font-size="15"
    font-weight="700" fill="#fff" text-anchor="middle">8</text>
  <rect x="546" y="222" width="60" height="26" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="0.8"/>
  <text x="576" y="240" font-family="ui-monospace,monospace" font-size="15"
    font-weight="700" fill="#fff" text-anchor="middle">9</text>
  <text x="660" y="237" font-family="ui-sans-serif,sans-serif" font-size="13"
    fill="#1D4ED8">row 2</text>

  <!-- ── Arrows (using <path> elements) ─────────────────────── -->
  <!-- Stack grid ref → ref array: Stack right=168, ref array left=204 -->
  <path d="M154 79 L204 104"
    fill="none" stroke="#0284C7" stroke-width="2" marker-end="url(#al-arr)"/>

  <!-- ref array → Row 0 -->
  <path d="M334 104 L386 88"
    fill="none" stroke="#0284C7" stroke-width="1.8" marker-end="url(#al-arr)"/>
  <!-- ref array → Row 1 -->
  <path d="M334 158 L386 158"
    fill="none" stroke="#0284C7" stroke-width="1.8" marker-end="url(#al-arr)"/>
  <!-- ref array → Row 2 -->
  <path d="M334 212 L386 228"
    fill="none" stroke="#0284C7" stroke-width="1.8" marker-end="url(#al-arr)"/>

  <!-- ── Warning box + bottom note ─────────────────────────── -->
  <!-- Draw rect FIRST so text renders on top -->
  <!-- Box: y=284, h=46 → contains lines at y=300 and y=320 -->
  <rect x="8" y="284" width="704" height="46" rx="6"
    fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5"/>
  <text x="360" y="303" font-family="ui-sans-serif,sans-serif" font-size="14"
    fill="#0369A1" text-anchor="middle" font-weight="700">[!] Rows are NOT contiguous in memory — each row is a separate Heap object</text>
  <text x="360" y="322" font-family="ui-sans-serif,sans-serif" font-size="12"
    fill="#64748b" text-anchor="middle">Unlike C/C++ where int[3][3] is one flat block of 36 bytes</text>
</svg>
