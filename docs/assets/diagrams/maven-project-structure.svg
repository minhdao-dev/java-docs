<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340" style="max-width:480px;display:block;margin:1rem auto">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background card -->
  <rect x="10" y="10" width="460" height="320" rx="10" fill="#F8FAFD" stroke="#D0D8E4" stroke-width="1.2"/>

  <!-- Title -->
  <text x="240" y="36" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="700" fill="#1A5296">Maven Project Structure</text>

  <!-- Tree lines — vertical connectors -->
  <!-- Root -->
  <text x="30" y="66" font-family="ui-monospace,monospace" font-size="12" fill="#E65100" font-weight="700">📁 my-app/</text>

  <!-- pom.xml -->
  <line x1="46" y1="70" x2="46" y2="86" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="46" y1="86" x2="58" y2="86" stroke="#B4B2A9" stroke-width="1"/>
  <text x="62" y="90" font-family="ui-monospace,monospace" font-size="12" fill="#9C27B0" font-weight="700">📄 pom.xml</text>

  <!-- src/ -->
  <line x1="46" y1="86" x2="46" y2="112" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="46" y1="112" x2="58" y2="112" stroke="#B4B2A9" stroke-width="1"/>
  <text x="62" y="116" font-family="ui-monospace,monospace" font-size="12" fill="#1A5296" font-weight="700">📁 src/</text>

  <!-- src/main/ -->
  <line x1="46" y1="112" x2="46" y2="200" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="78" y1="116" x2="78" y2="138" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="78" y1="138" x2="90" y2="138" stroke="#B4B2A9" stroke-width="1"/>
  <text x="94" y="142" font-family="ui-monospace,monospace" font-size="12" fill="#1A5296">📁 main/</text>

  <!-- src/main/java/ -->
  <line x1="78" y1="138" x2="78" y2="164" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="110" y1="142" x2="110" y2="164" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="110" y1="164" x2="122" y2="164" stroke="#B4B2A9" stroke-width="1"/>
  <text x="126" y="168" font-family="ui-monospace,monospace" font-size="12" fill="#1A5296">📁 java/</text>

  <!-- src/main/java/com/example/App.java -->
  <line x1="110" y1="164" x2="110" y2="200" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="142" y1="168" x2="142" y2="190" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="142" y1="190" x2="154" y2="190" stroke="#B4B2A9" stroke-width="1"/>
  <text x="158" y="194" font-family="ui-monospace,monospace" font-size="12" fill="#2E7D32">📁 com/example/</text>
  <line x1="142" y1="190" x2="142" y2="216" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="142" y1="216" x2="154" y2="216" stroke="#B4B2A9" stroke-width="1"/>
  <text x="158" y="220" font-family="ui-monospace,monospace" font-size="12" fill="#2E7D32">📄 App.java</text>

  <!-- src/main/resources/ -->
  <line x1="78" y1="164" x2="78" y2="238" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="78" y1="238" x2="90" y2="238" stroke="#B4B2A9" stroke-width="1"/>
  <text x="94" y="242" font-family="ui-monospace,monospace" font-size="12" fill="#1A5296">📁 resources/</text>

  <!-- src/test/ -->
  <line x1="46" y1="200" x2="46" y2="264" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="46" y1="264" x2="58" y2="264" stroke="#B4B2A9" stroke-width="1"/>
  <text x="62" y="268" font-family="ui-monospace,monospace" font-size="12" fill="#1A5296">📁 test/</text>

  <!-- src/test/java/ -->
  <line x1="78" y1="268" x2="78" y2="290" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="78" y1="290" x2="90" y2="290" stroke="#B4B2A9" stroke-width="1"/>
  <text x="94" y="294" font-family="ui-monospace,monospace" font-size="12" fill="#1A5296">📁 java/</text>
  <line x1="78" y1="290" x2="78" y2="312" stroke="#B4B2A9" stroke-width="1"/>
  <line x1="78" y1="312" x2="90" y2="312" stroke="#B4B2A9" stroke-width="1"/>
  <text x="94" y="316" font-family="ui-monospace,monospace" font-size="12" fill="#555">📄 AppTest.java</text>

  <!-- target/ -->
  <text x="62" y="242" font-family="ui-monospace,monospace" font-size="12" fill="#B4B2A9">📁 resources/</text>

  <!-- Annotations on right side -->
  <!-- pom.xml annotation -->
  <line x1="218" y1="86" x2="280" y2="86" stroke="#9C27B0" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="286" y="90" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#6A1B9A">project config &amp; dependencies</text>

  <!-- java/ annotation -->
  <line x1="190" y1="168" x2="280" y2="148" stroke="#1A5296" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="286" y="144" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#1A5296">your source code</text>

  <!-- App.java annotation -->
  <line x1="280" y1="220" x2="360" y2="220" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="366" y="224" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#2E7D32">entry point</text>

  <!-- resources/ annotation -->
  <line x1="210" y1="242" x2="280" y2="262" stroke="#1A5296" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="286" y="266" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#1A5296">config files, SQL, XML</text>

  <!-- test/ annotation -->
  <line x1="118" y1="294" x2="280" y2="294" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="286" y="298" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#555">unit tests (JUnit)</text>
</svg>
