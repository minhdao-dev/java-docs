<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 354" style="max-width:520px;display:block;margin:1rem auto">
  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7BADE0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══ SECTION 1 — Primitive ══ -->
  <rect x="8" y="8" width="504" height="108" rx="8" fill="#EEF4FB" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="260" y="25" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="700" fill="#1A5296">① Primitive — copy of VALUE</text>

  <!-- CALLER frame -->
  <rect x="18" y="34" width="110" height="72" rx="6" fill="#fff" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="73" y="50" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#888" letter-spacing="1">CALLER</text>
  <text x="73" y="72" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#1A5296">x = 10</text>
  <text x="73" y="89" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#B4B2A9">int x</text>

  <!-- Arrow CALLER → METHOD -->
  <line x1="130" y1="70" x2="162" y2="70" stroke="#888" stroke-width="1.2" marker-end="url(#ag)"/>
  <text x="146" y="60" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#888">copy</text>

  <!-- METHOD frame (primitive) -->
  <rect x="164" y="34" width="144" height="72" rx="6" fill="#F4F7FD" stroke="#7BADE0" stroke-width="0.8" stroke-dasharray="4 2"/>
  <text x="236" y="50" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#888" letter-spacing="1">METHOD</text>
  <text x="236" y="70" text-anchor="middle" font-family="ui-monospace,monospace" font-size="13" font-weight="600" fill="#1A5296">n = 10</text>
  <text x="236" y="87" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#888">n += 5  →  15</text>

  <!-- Divider + after-return result -->
  <line x1="318" y1="38" x2="318" y2="106" stroke="#C8D8EE" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="415" y="54" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#888">after return:</text>
  <text x="415" y="76" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#2E7D32">x = 10</text>
  <text x="415" y="93" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#2E7D32">unchanged ✓</text>

  <!-- ══ SECTION 2 — Reference ══ -->
  <!-- y=126 to y=342 (h=216) -->
  <rect x="8" y="126" width="504" height="216" rx="8" fill="#EEF4FB" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="260" y="143" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="11" font-weight="700" fill="#E65100">② Reference — copy of ADDRESS</text>

  <!-- STACK sub-box: y=152 h=180 bottom=332 -->
  <rect x="18" y="152" width="232" height="180" rx="6" fill="#F4F7FD" stroke="#7BADE0" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="30" y="167" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#7BADE0" font-weight="700" letter-spacing="1">STACK</text>

  <!-- CALLER frame (reference): y=174 h=52 bottom=226 -->
  <rect x="28" y="174" width="212" height="52" rx="6" fill="#fff" stroke="#7BADE0" stroke-width="0.8"/>
  <text x="68" y="190" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#888" letter-spacing="1">CALLER</text>
  <text x="134" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="700" fill="#1A5296">arr  →  0xA1</text>

  <!-- Arrow CALLER → HEAP array -->
  <line x1="242" y1="202" x2="274" y2="214" stroke="#7BADE0" stroke-width="1.2" marker-end="url(#ab)"/>

  <!-- METHOD frame (reference): y=236 h=84 bottom=320 -->
  <rect x="28" y="236" width="212" height="84" rx="6" fill="#EEF4FB" stroke="#7BADE0" stroke-width="0.8" stroke-dasharray="4 2"/>
  <text x="68" y="252" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#888" letter-spacing="1">METHOD</text>
  <text x="134" y="270" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="700" fill="#1A5296">a  →  0xA1</text>
  <text x="134" y="288" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#2E7D32">a[0] = 99  →  caller sees it  ✓</text>
  <text x="134" y="306" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#E57373">a = new int[]{…}  →  caller does NOT  ✗</text>

  <!-- Arrow METHOD → HEAP array -->
  <line x1="242" y1="264" x2="274" y2="232" stroke="#7BADE0" stroke-width="1.2" marker-end="url(#ab)"/>

  <!-- HEAP sub-box: y=152 h=180 bottom=332 -->
  <rect x="266" y="152" width="238" height="180" rx="6" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="278" y="167" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#FFB74D" font-weight="700" letter-spacing="1">HEAP</text>

  <!-- Array object on heap: y=174 h=88 bottom=262 -->
  <rect x="276" y="174" width="218" height="88" rx="6" fill="#fff" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="385" y="192" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" fill="#B4B2A9">0xA1  —  int[]</text>
  <text x="385" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" fill="#888">[  1,   2,   3  ]</text>
  <text x="385" y="228" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#888">after  a[0] = 99 :</text>
  <text x="385" y="246" text-anchor="middle" font-family="ui-monospace,monospace" font-size="12" font-weight="700" fill="#E65100">[  99,  2,   3  ]</text>

  <!-- New object (reassign): y=272 h=50 bottom=322 -->
  <rect x="276" y="272" width="218" height="50" rx="6" fill="#FDECEA" stroke="#E57373" stroke-width="0.8"/>
  <text x="385" y="291" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10.5" fill="#C62828">a = new int[]{ 7, 8, 9 }</text>
  <text x="385" y="309" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9.5" fill="#E57373">0xB4 — unreachable by caller</text>
</svg>
