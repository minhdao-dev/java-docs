site_name: NMD Java Backend
site_url: https://minhdao-dev.github.io/java-docs/
site_description: "Lộ trình Java Backend từ JVM đến Microservices · Java Backend roadmap from JVM to Microservices"
site_author: Nguyen Minh Dao
copyright: Copyright &copy; 2026 NMD

theme:
  name: material
  custom_dir: overrides
  font:
    text: Roboto
    code: JetBrains Mono
  icon:
    logo: material/book-open-page-variant
  palette:
    - scheme: default
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  language: vi

nav:
  - Trang chủ: index.md
  - Java:
    - Cài đặt môi trường:
      - Tổng quan: java/setup/index.md
      - Cài đặt JDK 21: java/setup/01-install-jdk.md
      - Cài đặt IDE: java/setup/02-install-ide.md
      - Terminal cơ bản: java/setup/03-terminal-basics.md
      - Git và GitHub: java/setup/04-git-github.md
      - Maven và Hello World: java/setup/05-maven-hello-world.md
    - Nền tảng Java:
      - Tổng quan: java/fundamentals/index.md
      - JVM — Hoạt động thế nào: java/fundamentals/01-jvm-how-it-works.md
      - Kiểu dữ liệu và Biến: java/fundamentals/02-variables-datatypes.md
      - Toán tử: java/fundamentals/03-operators.md
      - Rẽ nhánh — if / else / switch: java/fundamentals/04-control-flow.md
      - Vòng lặp — for / while / do-while / for-each: java/fundamentals/05-loops.md
      - Mảng — Array 1D & 2D: java/fundamentals/06-arrays.md
      - String và StringBuilder: java/fundamentals/07-strings.md
      - Method và Pass-by-value: java/fundamentals/08-methods.md
      - Enum: java/fundamentals/09-enum.md
      - File I/O: java/fundamentals/10-file-io.md
      - OOP — Class và Object: java/fundamentals/11-oop-class-object.md
      - Encapsulation và Constructor: java/fundamentals/12-encapsulation-constructor.md
      - Kế thừa — Inheritance: java/fundamentals/13-inheritance.md
      - Đa hình — Polymorphism: java/fundamentals/14-polymorphism.md
      - Abstract Class: java/fundamentals/15-abstract-class.md
      - Records: java/fundamentals/16-records.md
      - Interface: java/fundamentals/17-interface.md
      - instanceof và Type Casting: java/fundamentals/18-instanceof-type-casting.md
    - Bài tập:
      - Tổng quan: java/exercises/index.md
      - Giai đoạn 1 — Nền tảng ngôn ngữ:
        - Tổng quan: java/exercises/phase1/index.md
        - 01. Biến, Kiểu dữ liệu, Toán tử: java/exercises/phase1/01-variables.md
        - 02. Câu điều kiện: java/exercises/phase1/02-conditions.md
        - 03. Vòng lặp: java/exercises/phase1/03-loops.md
        - 04. Hàm (Method): java/exercises/phase1/04-methods.md
        - 05. String: java/exercises/phase1/05-strings.md
      - Giai đoạn 2 — Tư duy lập trình:
        - Tổng quan: java/exercises/phase2/index.md
        - 06. Array & Two Pointers: java/exercises/phase2/06-array-two-pointers.md
        - 07. HashMap & HashSet: java/exercises/phase2/07-hashmap-hashset.md
        - 08. Stack & Queue: java/exercises/phase2/08-stack-queue.md
        - 09. Đệ quy (Recursion): java/exercises/phase2/09-recursion.md
      - Giai đoạn 3 — Thuật toán cơ bản:
        - Tổng quan: java/exercises/phase3/index.md
        - 10. Sắp xếp & Tìm kiếm nhị phân: java/exercises/phase3/10-sorting-binary-search.md
        - 11. Sliding Window: java/exercises/phase3/11-sliding-window.md
        - 12. Linked List: java/exercises/phase3/12-linked-list.md
        - 13. Tree & Graph cơ bản: java/exercises/phase3/13-tree-graph.md
      - Giai đoạn 4 — Java Advanced:
        - Tổng quan: java/exercises/phase4/index.md
        - 14. OOP: java/exercises/phase4/14-oop.md
        - 15. Collections Framework: java/exercises/phase4/15-collections.md
        - 16. Stream API & Lambda: java/exercises/phase4/16-stream-lambda.md
        - 17. Exception & DateTime: java/exercises/phase4/17-exception-datetime.md
        - 18. Concurrency: java/exercises/phase4/18-concurrency.md

plugins:
  - search:
      lang:
        - en
        - vi
      separator: '[\s\-,:!=\[\]()"`/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)'
  - social:
      cards_layout_options:
        background_color: "#0369A1"
        color: "#FFFFFF"
        font_family: Roboto
  - i18n:
      docs_structure: suffix
      languages:
        - locale: vi
          default: true
          name: Tiếng Việt
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Trang chủ: Home
            Java: Java
            Cài đặt môi trường: Environment Setup
            Nền tảng Java: Java Fundamentals
