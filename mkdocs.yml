            Maven và Hello World: Maven and Hello World
            JVM — Hoạt động thế nào: JVM — How it works
            Kiểu dữ liệu và Biến: Variables & Data Types
            Toán tử: Operators
            Rẽ nhánh — if / else / switch: Control Flow — if / else / switch
            Vòng lặp — for / while / do-while / for-each: Loops — for / while / do-while / for-each
            Mảng — Array 1D & 2D: Arrays — 1D & 2D
            String và StringBuilder: String and StringBuilder
            Method và Pass-by-value: Methods and Pass-by-value
            Enum: Enum
            File I/O: File I/O
            OOP — Class và Object: OOP — Class and Object
            Encapsulation và Constructor: Encapsulation and Constructor
            Kế thừa — Inheritance: Inheritance
            Đa hình — Polymorphism: Polymorphism
            Abstract Class: Abstract Class
            Records: Records
            Interface: Interface
            instanceof và Type Casting: instanceof and Type Casting
            Bài tập: Exercises
            Giai đoạn 1 — Nền tảng ngôn ngữ: Phase 1 — Language Fundamentals
            01. Biến, Kiểu dữ liệu, Toán tử: 01. Variables, Data Types, Operators
            02. Câu điều kiện: 02. Conditionals
