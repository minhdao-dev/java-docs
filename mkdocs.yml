site_name: NMD Java Backend
site_url: https://minhdao-dev.github.io/java-docs/
site_description: "Lộ trình Java Backend từ JVM đến Microservices · Java Backend roadmap from JVM to Microservices"
site_author: Nguyen Minh Dao
copyright: Copyright &copy; 2026 NMD

theme:
  name: material
  custom_dir: overrides
  font:
    text: Roboto
    code: JetBrains Mono
  icon:
    logo: material/book-open-page-variant
  palette:
    - scheme: default
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  language: vi

nav:
  - Trang chủ: index.md
  - Java:
    - Cài đặt môi trường:
      - Tổng quan: java/setup/index.md
      - Cài đặt JDK 21: java/setup/01-install-jdk.md
      - Cài đặt IDE: java/setup/02-install-ide.md
      - Terminal cơ bản: java/setup/03-terminal-basics.md
      - Git và GitHub: java/setup/04-git-github.md
      - Maven và Hello World: java/setup/05-maven-hello-world.md
    - Nền tảng Java:
      - Tổng quan: java/fundamentals/index.md
      - JVM — Hoạt động thế nào: java/fundamentals/01-jvm-how-it-works.md
      - Kiểu dữ liệu và Biến: java/fundamentals/02-variables-datatypes.md
      - Toán tử: java/fundamentals/03-operators.md
      - Rẽ nhánh — if / else / switch: java/fundamentals/04-control-flow.md
      - Vòng lặp — for / while / do-while / for-each: java/fundamentals/05-loops.md
      - Mảng — Array 1D & 2D: java/fundamentals/06-arrays.md
      - String và StringBuilder: java/fundamentals/07-strings.md
      - Method và Pass-by-value: java/fundamentals/08-methods.md
      - Enum: java/fundamentals/09-enum.md
      - File I/O: java/fundamentals/10-file-io.md
      - OOP — Class và Object: java/fundamentals/11-oop-class-object.md
      - Encapsulation và Constructor: java/fundamentals/12-encapsulation-constructor.md
      - Kế thừa — Inheritance: java/fundamentals/13-inheritance.md
      - Đa hình — Polymorphism: java/fundamentals/14-polymorphism.md
      - Abstract Class: java/fundamentals/15-abstract-class.md
      - Records: java/fundamentals/16-records.md
      - Interface: java/fundamentals/17-interface.md
      - instanceof và Type Casting: java/fundamentals/18-instanceof-type-casting.md

plugins:
  - search:
      lang:
        - en
        - vi
      separator: '[\s\-,:!=\[\]()"`/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)'
  - social:
      cards_layout_options:
        background_color: "#0369A1"
        color: "#FFFFFF"
        font_family: Roboto
  - i18n:
      docs_structure: suffix
      languages:
        - locale: vi
          default: true
          name: Tiếng Việt
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Trang chủ: Home
            Java: Java
            Cài đặt môi trường: Environment Setup
            Nền tảng Java: Java Fundamentals
            Tổng quan: Overview
            Cài đặt JDK 21: Install JDK 21
            Cài đặt IDE: Install IDE
            Terminal cơ bản: Terminal Basics
            Git và GitHub: Git and GitHub
            Maven và Hello World: Maven and Hello World
            JVM — Hoạt động thế nào: JVM — How it works
            Kiểu dữ liệu và Biến: Variables & Data Types
            Toán tử: Operators
            Rẽ nhánh — if / else / switch: Control Flow — if / else / switch
            Vòng lặp — for / while / do-while / for-each: Loops — for / while / do-while / for-each
            Mảng — Array 1D & 2D: Arrays — 1D & 2D
            String và StringBuilder: String and StringBuilder
            Method và Pass-by-value: Methods and Pass-by-value
            Enum: Enum
            File I/O: File I/O
            OOP — Class và Object: OOP — Class and Object
            Encapsulation và Constructor: Encapsulation and Constructor
            Kế thừa — Inheritance: Inheritance
            Đa hình — Polymorphism: Polymorphism
            Abstract Class: Abstract Class
            Records: Records
            Interface: Interface
            instanceof và Type Casting: instanceof and Type Casting

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/minhdao-dev
      name: GitHub
    - icon: fontawesome/solid/envelope
      link: mailto:daonguyenminh.it@gmail.com
      name: Email

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/lang-switcher.js
  - assets/javascripts/prev-next-nav.js
  - assets/javascripts/sub-nav.js
  - assets/javascripts/reading-progress.js
