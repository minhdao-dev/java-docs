markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/minhdao-dev
      name: GitHub
    - icon: fontawesome/solid/envelope
      link: mailto:daonguyenminh.it@gmail.com
      name: Email

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/lang-switcher.js
  - assets/javascripts/prev-next-nav.js
  - assets/javascripts/sub-nav.js
  - assets/javascripts/reading-progress.js
